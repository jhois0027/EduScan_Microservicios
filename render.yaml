services:
  # Servicio de Gateway API con IA Validada
  - type: web
    name: eduscan-gateway
    runtime: python
    repo: https://github.com/jhois0027/EduScan_Microservicios.git  # Cambia por tu repo
    plan: free
    region: oregon
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr
      pip install --upgrade pip
      pip install opencv-python-headless==4.8.1.78
      pip install numpy==1.26.4
      pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.gateway:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: eduscan-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract

  # Base de datos PostgreSQL
  - type: postgresql
    name: eduscan-db
    plan: free
    region: oregon
    databaseName: eduscan
    user: eduscan_user
    ipAllowList: []
