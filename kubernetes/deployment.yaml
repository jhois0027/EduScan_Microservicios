apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduscan-gateway
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eduscan-gateway
  template:
    metadata:
      labels:
        app: eduscan-gateway
    spec:
      containers:
      - name: gateway
        image: eduscan/gateway:latest
        ports:
        - containerPort: 8000
