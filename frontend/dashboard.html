<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduScan - Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #667eea;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat h2 {
            font-size: 32px;
            color: #667eea;
            margin: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f0f2f5;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            color: red;
            padding: 20px;
            background: #ffe0e0;
            border-radius: 10px;
        }
        .success {
            color: green;
            padding: 10px;
            background: #e0ffe0;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ý│Ő EduScan Dashboard</h1>
        <button onclick="cargarDatos()">Ý┤ä Cargar Datos</button>
        
        <div id="status"></div>
        <div id="contenido"></div>
    </div>

    <script>
        // Funci├│n para cargar datos
        async function cargarDatos() {
            const statusDiv = document.getElementById('status');
            const contenidoDiv = document.getElementById('contenido');
            
            statusDiv.innerHTML = '<div class="loading">Cargando datos...</div>';
            contenidoDiv.innerHTML = '';
            
            try {
                // 1. Verificar health
                const healthRes = await fetch('http://localhost:8003/health');
                const health = await healthRes.json();
                console.log('Health:', health);
                
                if (health.status !== 'healthy') {
                    throw new Error('Base de datos no disponible');
                }
                
                // 2. Cargar resumen
                const resumenRes = await fetch('http://localhost:8003/dashboard/resumen');
                const resumen = await resumenRes.json();
                console.log('Resumen:', resumen);
                
                // 3. Cargar evaluaciones
                const evalRes = await fetch('http://localhost:8003/evaluaciones');
                const evaluaciones = await evalRes.json();
                console.log('Evaluaciones:', evaluaciones);
                
                // 4. Cargar alumnos
                const alumnosRes = await fetch('http://localhost:8003/alumnos');
                const alumnos = await alumnosRes.json();
                console.log('Alumnos:', alumnos);
                
                // Mostrar ├ęxito
                statusDiv.innerHTML = '<div class="success">Ôťů Datos cargados correctamente</div>';
                
                // Construir HTML
                let html = '';
                
                // Estad├şsticas
                html += '<div class="stats">';
                html += `<div class="stat"><h2>${resumen.estadisticas.total_alumnos}</h2><p>Total Alumnos</p></div>`;
                html += `<div class="stat"><h2>${resumen.estadisticas.total_evaluaciones}</h2><p>Evaluaciones</p></div>`;
                html += `<div class="stat"><h2>${resumen.estadisticas.promedio_general}</h2><p>Promedio General</p></div>`;
                html += `<div class="stat"><h2>${resumen.estadisticas.mejor_nota}</h2><p>Mejor Nota</p></div>`;
                html += '</div>';
                
                // Top Alumnos
                html += '<div class="card"><h3>Ý┐ć Top 5 Mejores Alumnos</h3><table><thead><tr><th>#</th><th>Nombre</th><th>Promedio</th></tr></thead><tbody>';
                resumen.top_alumnos.forEach((a, i) => {
                    html += `<tr><td>${i+1}</td><td><strong>${a.nombre}</strong></td><td>ÔşÉ ${a.promedio}</td></tr>`;
                });
                html += '</tbody></table></div>';
                
                // ├Ültimas Evaluaciones
                html += '<div class="card"><h3>Ý│ő ├Ültimas Evaluaciones</h3><table><thead><tr><th>Alumno</th><th>Nota</th><th>Fecha</th><th>Estado</th></tr></thead><tbody>';
                evaluaciones.evaluaciones.slice(0, 10).forEach(e => {
                    const estado = e.puntaje >= 3 ? '<span style="color:green">Ôťô Aprobado</span>' : '<span style="color:red">ÔťŚ Reprobado</span>';
                    html += `<tr><td>${e.alumno}</td><td><strong>${e.puntaje}</strong></td><td>${e.fecha}</td><td>${estado}</td></tr>`;
                });
                html += '</tbody></table></div>';
                
                // Lista de Alumnos
                html += '<div class="card"><h3>Ý▒ĘÔÇŹÝżô Lista de Alumnos</h3><table><thead><tr><th>ID</th><th>Nombre</th><th>Correo</th></tr></thead><tbody>';
                alumnos.alumnos.forEach(a => {
                    html += `<tr><td>${a.id_alumno}</td><td>${a.nombre}</td><td>${a.correo}</td></tr>`;
                });
                html += '</tbody></table></div>';
                
                contenidoDiv.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = `<div class="error">ÔŁî Error: ${error.message}<br><br>Verifica que el servicio database.py est├ę corriendo en el puerto 8003</div>`;
            }
        }
        
        // Cargar autom├íticamente
        cargarDatos();
    </script>
</body>
</html>
