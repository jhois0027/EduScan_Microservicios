<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EduScan - Dashboard con IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        .header {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 { color: #4f46e5; margin-bottom: 8px; font-size: 1.8rem; }
        .header p { color: #64748b; }
        
        .device-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .device-btn {
            padding: 10px 24px;
            border-radius: 60px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .device-btn.active {
            background: white;
            color: #4f46e5;
        }
        
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            display: block;
        }
        
        select, button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
        }
        
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .camera-preview {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video, .preview-img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        .camera-placeholder {
            background: linear-gradient(135deg, #1e1b4b, #3730a3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: white;
            text-align: center;
            width: 100%;
            border-radius: 24px;
        }
        
        .flex-row {
            display: flex;
            gap: 12px;
        }
        .flex-row button { flex: 1; }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        .btn-success {
            background: #10b981;
        }
        
        .resultado {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            display: none;
        }
        .resultado.success { background: #d1fae5; color: #065f46; display: block; }
        .resultado.error { background: #fee2e2; color: #991b1b; display: block; }
        .resultado.loading { background: #e0e7ff; color: #3730a3; display: block; }
        
        .nota-final {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin: 15px 0;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1000;
            display: none;
        }
        
        @media (max-width: 640px) {
            .container { padding: 0; }
            .flex-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> EduScan - Corrector IA</h1>
            <p>Toma foto o sube imagen - IA con Gemini corrige automĂˇticamente</p>
        </div>

        <div class="device-bar">
            <button class="device-btn active" data-device="auto">í¶Ąď¸Ź Auto</button>
            <button class="device-btn" data-device="mobile">íł± MĂłvil</button>
            <button class="device-btn" data-device="pc">í˛» PC</button>
        </div>

        <div class="card">
            <label><i class="fas fa-user-graduate"></i> Alumno</label>
            <select id="selectAlumno">
                <option value="">-- Seleccionar alumno --</option>
            </select>
            
            <label><i class="fas fa-file-alt"></i> Examen</label>
            <select id="selectExamen">
                <option value="">-- Seleccionar examen --</option>
            </select>
        </div>

        <div class="card">
            <div class="camera-preview" id="cameraPreview">
                <div class="camera-placeholder" id="cameraPlaceholder">
                    <i class="fas fa-camera" style="font-size: 48px; margin-bottom: 16px;"></i>
                    <p>Haz clic en "Abrir Camara" o "Subir Imagen"</p>
                </div>
                <video id="cameraVideo" autoplay playsinline style="display:none; width:100%;"></video>
                <canvas id="cameraCanvas" style="display:none;"></canvas>
                <img id="previewImg" class="preview-img" style="display:none;">
            </div>

            <div class="flex-row">
                <button id="btnAbrirCamara"><i class="fas fa-camera"></i> Abrir Camara</button>
                <button id="btnCerrarCamara" class="btn-secondary" style="display:none;"><i class="fas fa-stop"></i> Cerrar</button>
                <button id="btnSubirImagen" class="btn-secondary"><i class="fas fa-upload"></i> Subir Imagen</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">

            <button id="btnCorregir" class="btn-success" disabled><i class="fas fa-magic"></i> Corregir con Gemini IA</button>
            <button id="btnGuardar" class="btn-success" style="background:#10b981; display:none;"><i class="fas fa-save"></i> Guardar Calificacion</button>
        </div>

        <div id="resultadoArea" class="resultado"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================
        // CONFIGURACION CON GEMINI API
        // ============================================
        const GEMINI_API_KEY = 'TU_API_KEY_AQUI';  // í´´ CAMBIA ESTO POR TU API KEY DE GEMINI
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const API_URL = 'https://eduscan-gateway.onrender.com';
        let alumnos = [];
        let examenes = [];
        let preguntas = [];
        let currentImageData = null;
        let cameraStream = null;
        let ultimaCorreccion = null;
        let currentDevice = 'auto';

        // ============================================
        // CARGAR DATOS DESDE LA API
        // ============================================
        async function cargarAlumnos() {
            try {
                const response = await fetch(`${API_URL}/alumnos`);
                const data = await response.json();
                alumnos = data.alumnos || [];
            } catch (error) {
                console.error("Error cargando alumnos:", error);
                const saved = localStorage.getItem('eduscan_alumnos');
                alumnos = saved ? JSON.parse(saved) : [];
            }
            actualizarSelectores();
        }
        
        async function cargarExamenes() {
            try {
                const response = await fetch(`${API_URL}/examenes`);
                const data = await response.json();
                examenes = data.examenes || [];
            } catch (error) {
                const saved = localStorage.getItem('eduscan_examenes');
                examenes = saved ? JSON.parse(saved) : [];
            }
            actualizarSelectores();
        }
        
        async function cargarPreguntas(idExamen) {
            try {
                const response = await fetch(`${API_URL}/preguntas/examen/${idExamen}`);
                const data = await response.json();
                preguntas = data.preguntas || [];
            } catch (error) {
                // Preguntas de ejemplo
                preguntas = [
                    { id: 1, texto: "ÂżCuĂˇnto es 2 + 2?", respuesta_correcta: "4", puntaje: 1 },
                    { id: 2, texto: "ÂżCuĂˇnto es 5 x 3?", respuesta_correcta: "15", puntaje: 1 },
                    { id: 3, texto: "ÂżCuĂˇl es la raĂ­z cuadrada de 16?", respuesta_correcta: "4", puntaje: 1 }
                ];
            }
        }
        
        function actualizarSelectores() {
            const selectAlumno = document.getElementById('selectAlumno');
            selectAlumno.innerHTML = '<option value="">-- Seleccionar alumno --</option>' + 
                alumnos.map(a => `<option value="${a.id_alumno}">${a.nombre} (${a.grado}Â°)</option>`).join('');
            
            const selectExamen = document.getElementById('selectExamen');
            selectExamen.innerHTML = '<option value="">-- Seleccionar examen --</option>' + 
                examenes.map(e => `<option value="${e.id_examen}">${e.titulo} (${e.grado}Â°)</option>`).join('');
        }
        
        function mostrarToast(mensaje, esError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.style.backgroundColor = esError ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
        
        // ============================================
        // CAMARA (CORREGIDA)
        // ============================================
        async function abrirCamara() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("Tu navegador no soporta la cĂˇmara");
                }
                
                const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                const constraints = isMobile ? 
                    { video: { facingMode: { exact: "environment" } } } : 
                    { video: true };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                await video.play();
                cameraStream = stream;
                
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('previewImg').style.display = 'none';
                video.style.display = 'block';
                document.getElementById('btnAbrirCamara').style.display = 'none';
                document.getElementById('btnCerrarCamara').style.display = 'inline-block';
                
                mostrarToast("CĂˇmara activada. Tomando foto en 2 segundos...");
                
                setTimeout(() => {
                    if (video.videoWidth > 0) {
                        tomarFoto();
                    } else {
                        mostrarToast("Error: La cĂˇmara no se iniciĂł correctamente", true);
                    }
                }, 2000);
                
            } catch (err) {
                mostrarToast("Error al abrir cĂˇmara: " + err.message, true);
            }
        }
        
        function tomarFoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentImageData = canvas.toDataURL('image/jpeg', 0.8);
            
            const previewImg = document.getElementById('previewImg');
            previewImg.src = currentImageData;
            previewImg.style.display = 'block';
            video.style.display = 'none';
            
            document.getElementById('btnCorregir').disabled = false;
            document.getElementById('resultadoArea').className = 'resultado loading';
            document.getElementById('resultadoArea').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Foto tomada. Presiona "Corregir con Gemini IA"';
            
            cerrarCamara();
        }
        
        function cerrarCamara() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            document.getElementById('cameraVideo').style.display = 'none';
            document.getElementById('btnAbrirCamara').style.display = 'inline-block';
            document.getElementById('btnCerrarCamara').style.display = 'none';
        }
        
        function subirImagen() {
            document.getElementById('fileInput').click();
        }
        
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentImageData = ev.target.result;
                const previewImg = document.getElementById('previewImg');
                previewImg.src = currentImageData;
                previewImg.style.display = 'block';
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('cameraVideo').style.display = 'none';
                document.getElementById('btnCorregir').disabled = false;
                document.getElementById('resultadoArea').className = 'resultado loading';
                document.getElementById('resultadoArea').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Imagen cargada. Presiona "Corregir con Gemini IA"';
            };
            reader.readAsDataURL(file);
        }
        
        // ============================================
        // CORRECCION CON GEMINI IA
        // ============================================
        async function extraerTextoConGemini(imageBase64) {
            const prompt = `Eres un profesor. Extrae SOLO las respuestas del alumno de esta imagen de examen. 
            Devuelve SOLO las respuestas en formato JSON: {"respuestas": ["respuesta1", "respuesta2", ...]}
            Si no ves una respuesta clara, escribe "No respondida".`;
            
            const requestBody = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inline_data: { mime_type: "image/jpeg", data: imageBase64.split(',')[1] } }
                    ]
                }]
            };
            
            try {
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                const data = await response.json();
                const texto = data.candidates[0].content.parts[0].text;
                const jsonMatch = texto.match(/\{.*\}/s);
                if (jsonMatch) {
                    return JSON.parse(jsonMatch[0]).respuestas;
                }
                return [];
            } catch (error) {
                console.error("Error con Gemini:", error);
                return null;
            }
        }
        
        async function corregirExamen() {
            const alumnoId = document.getElementById('selectAlumno').value;
            const examenId = document.getElementById('selectExamen').value;
            
            if (!alumnoId || !examenId) {
                mostrarToast('Selecciona un alumno y un examen', true);
                return;
            }
            if (!currentImageData) {
                mostrarToast('Toma una foto o sube una imagen', true);
                return;
            }
            
            const resultDiv = document.getElementById('resultadoArea');
            resultDiv.className = 'resultado loading';
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando a Gemini IA para correcciĂłn...';
            
            await cargarPreguntas(examenId);
            
            const respuestasAlumno = await extraerTextoConGemini(currentImageData);
            
            if (!respuestasAlumno) {
                resultDiv.className = 'resultado error';
                resultDiv.innerHTML = '<strong>Error:</strong> No se pudo extraer texto de la imagen. AsegĂşrate de que la imagen sea clara.';
                return;
            }
            
            // Calcular puntaje
            let puntajeTotal = 0;
            let puntajeMaximo = 0;
            let detalles = [];
            
            for (let i = 0; i < preguntas.length; i++) {
                const pregunta = preguntas[i];
                const respuestaAlumno = respuestasAlumno[i] || "No respondida";
                const esCorrecta = respuestaAlumno.toLowerCase().trim() === pregunta.respuesta_correcta.toLowerCase().trim();
                const puntajeObtenido = esCorrecta ? pregunta.puntaje : 0;
                
                puntajeTotal += puntajeObtenido;
                puntajeMaximo += pregunta.puntaje;
                
                detalles.push({
                    pregunta: pregunta.texto,
                    respuesta_alumno: respuestaAlumno,
                    respuesta_correcta: pregunta.respuesta_correcta,
                    puntaje_obtenido: puntajeObtenido,
                    puntaje_maximo: pregunta.puntaje,
                    correcta: esCorrecta
                });
            }
            
            const porcentaje = Math.round((puntajeTotal / puntajeMaximo) * 100);
            const alumno = alumnos.find(a => a.id_alumno == alumnoId);
            const examen = examenes.find(e => e.id_examen == examenId);
            
            ultimaCorreccion = { nota: porcentaje, examenId: examenId, alumnoId: alumnoId, detalles: detalles };
            
            let detallesHtml = '<div style="margin-top:15px;"><strong>íłť Detalle de respuestas:</strong>';
            detalles.forEach(d => {
                const color = d.correcta ? '#d1fae5' : '#fee2e2';
                detallesHtml += `
                    <div style="background:${color}; border-radius:12px; padding:10px; margin:8px 0;">
                        <strong>${d.pregunta}</strong><br>
                        Respuesta: ${d.respuesta_alumno}<br>
                        Esperado: ${d.respuesta_correcta}<br>
                        Puntaje: ${d.puntaje_obtenido}/${d.puntaje_maximo}
                    </div>
                `;
            });
            detallesHtml += '</div>';
            
            let colorBg = porcentaje >= 70 ? '#d1fae5' : porcentaje >= 50 ? '#fed7aa' : '#fee2e2';
            resultDiv.className = 'resultado success';
            resultDiv.innerHTML = `
                <div style="text-align:center;">
                    <div class="nota-final">${porcentaje}%</div>
                    <p><strong>${alumno?.nombre || 'Alumno'}</strong> - ${examen?.titulo || 'Examen'}</p>
                    <p>Puntaje: ${puntajeTotal}/${puntajeMaximo}</p>
                    ${detallesHtml}
                    <button id="btnGuardarResultado" class="btn-success" style="margin-top:15px;"><i class="fas fa-save"></i> Guardar Calificacion</button>
                </div>
            `;
            document.getElementById('btnGuardarResultado').onclick = guardarCalificacion;
            document.getElementById('btnGuardar').style.display = 'inline-block';
        }
        
        async function guardarCalificacion() {
            if (!ultimaCorreccion) {
                mostrarToast('No hay correccion para guardar', true);
                return;
            }
            
            try {
                await fetch(`${API_URL}/calificaciones`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_alumno: parseInt(ultimaCorreccion.alumnoId),
                        id_examen: parseInt(ultimaCorreccion.examenId),
                        nota: ultimaCorreccion.nota
                    })
                });
                mostrarToast(`âś… CalificaciĂłn guardada: ${ultimaCorreccion.nota}%`);
            } catch (error) {
                // Fallback local
                let calificaciones = JSON.parse(localStorage.getItem('eduscan_calificaciones') || '[]');
                calificaciones.push({
                    id_alumno: parseInt(ultimaCorreccion.alumnoId),
                    id_examen: parseInt(ultimaCorreccion.examenId),
                    nota: ultimaCorreccion.nota,
                    fecha: new Date().toISOString().split('T')[0]
                });
                localStorage.setItem('eduscan_calificaciones', JSON.stringify(calificaciones));
                mostrarToast(`âś… CalificaciĂłn guardada LOCALMENTE: ${ultimaCorreccion.nota}%`);
            }
            
            document.getElementById('btnGuardar').style.display = 'none';
            document.getElementById('btnCorregir').disabled = true;
            currentImageData = null;
            await cargarAlumnos();
        }
        
        // ============================================
        // RESPONSIVE
        // ============================================
        function ajustarPorDispositivo() {
            const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            const usarMobile = currentDevice === 'mobile' || (currentDevice === 'auto' && isMobile);
            
            if (usarMobile) {
                document.querySelector('.container').style.maxWidth = '100%';
                document.body.style.padding = '10px';
            } else {
                document.querySelector('.container').style.maxWidth = '700px';
                document.body.style.padding = '20px';
            }
        }
        
        // ============================================
        // EVENTOS E INICIALIZACION
        // ============================================
        document.getElementById('btnAbrirCamara').onclick = abrirCamara;
        document.getElementById('btnCerrarCamara').onclick = cerrarCamara;
        document.getElementById('btnSubirImagen').onclick = subirImagen;
        document.getElementById('fileInput').onchange = handleImageUpload;
        document.getElementById('btnCorregir').onclick = corregirExamen;
        document.getElementById('btnGuardar').onclick = guardarCalificacion;
        
        document.querySelectorAll('.device-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDevice = btn.dataset.device;
                ajustarPorDispositivo();
            };
        });
        
        // Inicializar
        cargarAlumnos();
        cargarExamenes();
        ajustarPorDispositivo();
    </script>
</body>
</html>
