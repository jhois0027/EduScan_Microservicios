<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduScan - Dashboard Docente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .login-box, .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { color: #1e3c72; font-size: 28px; }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .grados-badge { background: #e0e7ff; padding: 8px 16px; border-radius: 20px; font-size: 14px; color: #3730a3; }
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover { background: #1e3c72; transform: translateY(-2px); }
        .logout-btn { background: #dc2626; }
        .logout-btn:hover { background: #b91c1c; }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .nav-tab {
            background: #f3f4f6;
            color: #374151;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-tab:hover { background: #e5e7eb; }
        .nav-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h3 { font-size: 32px; margin-bottom: 10px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f8fafc; color: #1e293b; font-weight: 600; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-aprobado { background: #d1fae5; color: #065f46; }
        .badge-mejoramiento { background: #fef3c7; color: #92400e; }
        .badge-reprobado { background: #fee2e2; color: #991b1b; }
        .error { color: red; text-align: center; padding: 20px; }
        .hidden { display: none; }
        input, select {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .btn-edit { background: #f59e0b; margin-right: 5px; }
        .btn-edit:hover { background: #d97706; }
        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #dc2626; }
        .btn-add { background: #10b981; margin-bottom: 15px; }
        .btn-add:hover { background: #059669; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            margin: 10px 0;
        }
        .form-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>

<!-- Pantalla de Login -->
<div id="loginDiv" class="login-box">
    <h2 style="text-align: center; margin-bottom: 30px;">📚 EduScan - Acceso Docente</h2>
    <input type="email" id="email" placeholder="Correo electrónico" value="ana@eduscan.com" style="width: 100%;">
    <input type="password" id="password" placeholder="Contraseña" value="123" style="width: 100%;">
    <button onclick="login()" style="width: 100%;">Ingresar</button>
    <div id="errorMsg" class="error"></div>
</div>

<!-- Dashboard -->
<div id="dashboardDiv" class="dashboard hidden">
    <div class="header">
        <h1>📊 Panel del Docente</h1>
        <div class="user-info">
            <span id="docenteNombre"></span>
            <span id="gradosInfo" class="grados-badge"></span>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="stats-grid" id="statsContainer"></div>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="cambiarSeccion('alumnos')">📋 Alumnos</div>
        <div class="nav-tab" onclick="cambiarSeccion('examenes')">📝 Exámenes</div>
        <div class="nav-tab" onclick="cambiarSeccion('calificaciones')">⭐ Calificaciones</div>
        <div class="nav-tab" onclick="cambiarSeccion('modulos')">📚 Módulos</div>
        <div class="nav-tab" onclick="cambiarSeccion('estadisticas')">📊 Estadísticas</div>
    </div>

    <div id="contenido" class="table-container">
        <p style="text-align: center; padding: 40px;">Selecciona una opción</p>
    </div>
</div>

<!-- Modal para editar/agregar -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Editar</h3>
        <form id="modalForm">
            <div id="modalFields"></div>
            <div class="form-buttons">
                <button type="button" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" style="background: #10b981;">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://eduscan-gateway.onrender.com';
    let TOKEN = '';
    let docenteActual = null;
    let datosCache = {
        alumnos: [],
        examenes: [],
        calificaciones: [],
        modulos: []
    };
    let seccionActual = 'alumnos';
    let editandoId = null;
    let editandoTipo = null;

    function obtenerEstado(nota) {
        if (nota >= 4.0) return 'Aprueba';
        if (nota >= 3.5) return 'Plan de mejoramiento';
        return 'Reprueba';
    }

    function obtenerClase(nota) {
        if (nota >= 4.0) return 'badge-aprobado';
        if (nota >= 3.5) return 'badge-mejoramiento';
        return 'badge-reprobado';
    }

    // ==================== LOGIN ====================
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = '';
        
        try {
            const response = await fetch(`${API_URL}/api/login?email=${email}&password=${password}`, { method: 'POST' });
            const data = await response.json();
            
            if (data.success) {
                TOKEN = data.token;
                docenteActual = data.docente;
                localStorage.setItem('token', TOKEN);
                localStorage.setItem('docente', JSON.stringify(docenteActual));
                
                document.getElementById('loginDiv').classList.add('hidden');
                document.getElementById('dashboardDiv').classList.remove('hidden');
                document.getElementById('docenteNombre').innerHTML = `👨‍🏫 ${docenteActual.nombre}`;
                
                await cargarTodosLosDatos();
                actualizarEstadisticas();
                cambiarSeccion('alumnos');
            } else {
                errorDiv.textContent = data.error || 'Credenciales inválidas';
            }
        } catch (error) {
            errorDiv.textContent = 'Error de conexión: ' + error.message;
        }
    }

    // ==================== CARGA DE DATOS ====================
    async function cargarTodosLosDatos() {
        await Promise.all([
            cargarAlumnos(),
            cargarExamenes(),
            cargarCalificaciones(),
            cargarModulos()
        ]);
    }

    async function cargarAlumnos() {
        try {
            const response = await fetch(`${API_URL}/api/mis-alumnos`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await response.json();
            if (data.success) {
                datosCache.alumnos = data.alumnos || [];
                document.getElementById('gradosInfo').innerHTML = `📚 Grados: ${data.mis_grados?.join(', ') || 'Ninguno'}`;
            }
        } catch (error) {
            console.error('Error cargando alumnos:', error);
        }
    }

    async function cargarExamenes() {
        try {
            const response = await fetch(`${API_URL}/api/examenes`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await response.json();
            if (data.success) {
                datosCache.examenes = data.examenes || [];
            }
        } catch (error) {
            console.error('Error cargando exámenes:', error);
        }
    }

    async function cargarCalificaciones() {
        try {
            const response = await fetch(`${API_URL}/api/calificaciones`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await response.json();
            if (data.success) {
                datosCache.calificaciones = data.calificaciones || [];
            }
        } catch (error) {
            console.error('Error cargando calificaciones:', error);
        }
    }

    async function cargarModulos() {
        datosCache.modulos = [
            { id: 1, nombre: "Matemáticas", profesor: "Prof. González", creditos: 4, horario: "Lunes 8-10am" },
            { id: 2, nombre: "Español", profesor: "Prof. Martínez", creditos: 4, horario: "Martes 8-10am" },
            { id: 3, nombre: "Ciencias", profesor: "Prof. Rodríguez", creditos: 3, horario: "Miércoles 8-10am" },
            { id: 4, nombre: "Historia", profesor: "Prof. López", creditos: 3, horario: "Jueves 8-10am" },
            { id: 5, nombre: "Inglés", profesor: "Prof. Wilson", creditos: 4, horario: "Viernes 8-10am" }
        ];
    }

    // ==================== ESTADÍSTICAS ====================
    function actualizarEstadisticas() {
        const totalAlumnos = datosCache.alumnos.length;
        const aprobados = datosCache.alumnos.filter(a => (a.promedio || 0) >= 4.0).length;
        const promedioGeneral = datosCache.alumnos.length > 0 
            ? (datosCache.alumnos.reduce((s, a) => s + (a.promedio || 0), 0) / datosCache.alumnos.length).toFixed(1)
            : 0;
        
        document.getElementById('statsContainer').innerHTML = `
            <div class="stat-card"><h3>${totalAlumnos}</h3><p>Total Alumnos</p></div>
            <div class="stat-card"><h3>${aprobados}</h3><p>Aprobados</p></div>
            <div class="stat-card"><h3>${promedioGeneral}</h3><p>Promedio General</p></div>
        `;
    }

    // ==================== CRUD ====================
    function abrirModal(tipo, id = null) {
        editandoTipo = tipo;
        editandoId = id;
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalFields = document.getElementById('modalFields');
        
        let item = null;
        if (id) {
            if (tipo === 'alumnos') item = datosCache.alumnos.find(a => a.id == id);
            else if (tipo === 'examenes') item = datosCache.examenes.find(e => e.id == id);
            else if (tipo === 'modulos') item = datosCache.modulos.find(m => m.id == id);
        }
        
        modalTitle.textContent = id ? `✏️ Editar ${tipo.slice(0, -1)}` : `➕ Nuevo ${tipo.slice(0, -1)}`;
        
        if (tipo === 'alumnos') {
            modalFields.innerHTML = `
                <input type="text" id="nombre" placeholder="Nombre" value="${item?.nombre || ''}">
                <input type="number" id="grado" placeholder="Grado" value="${item?.grado || ''}">
                <input type="text" id="correo" placeholder="Correo" value="${item?.correo || ''}">
            `;
        } else if (tipo === 'examenes') {
            modalFields.innerHTML = `
                <input type="text" id="nombre" placeholder="Nombre" value="${item?.nombre || ''}">
                <input type="number" id="grado" placeholder="Grado" value="${item?.grado || ''}">
                <input type="text" id="materia" placeholder="Materia" value="${item?.materia || ''}">
            `;
        } else if (tipo === 'modulos') {
            modalFields.innerHTML = `
                <input type="text" id="nombre" placeholder="Nombre" value="${item?.nombre || ''}">
                <input type="text" id="profesor" placeholder="Profesor" value="${item?.profesor || ''}">
                <input type="number" id="creditos" placeholder="Créditos" value="${item?.creditos || ''}">
                <input type="text" id="horario" placeholder="Horario" value="${item?.horario || ''}">
            `;
        }
        
        modal.style.display = 'flex';
        
        document.getElementById('modalForm').onsubmit = (e) => {
            e.preventDefault();
            guardarCambios();
        };
    }

    function cerrarModal() {
        document.getElementById('modal').style.display = 'none';
        editandoId = null;
        editandoTipo = null;
    }

    async function guardarCambios() {
        if (editandoTipo === 'alumnos') {
            const nuevoAlumno = {
                id: editandoId || Date.now(),
                nombre: document.getElementById('nombre').value,
                grado: parseInt(document.getElementById('grado').value),
                correo: document.getElementById('correo').value,
                promedio: 0
            };
            
            if (editandoId) {
                const index = datosCache.alumnos.findIndex(a => a.id == editandoId);
                datosCache.alumnos[index] = nuevoAlumno;
            } else {
                datosCache.alumnos.push(nuevoAlumno);
            }
        } else if (editandoTipo === 'examenes') {
            const nuevoExamen = {
                id: editandoId || Date.now(),
                nombre: document.getElementById('nombre').value,
                grado: parseInt(document.getElementById('grado').value),
                materia: document.getElementById('materia').value
            };
            
            if (editandoId) {
                const index = datosCache.examenes.findIndex(e => e.id == editandoId);
                datosCache.examenes[index] = nuevoExamen;
            } else {
                datosCache.examenes.push(nuevoExamen);
            }
        } else if (editandoTipo === 'modulos') {
            const nuevoModulo = {
                id: editandoId || Date.now(),
                nombre: document.getElementById('nombre').value,
                profesor: document.getElementById('profesor').value,
                creditos: parseInt(document.getElementById('creditos').value),
                horario: document.getElementById('horario').value
            };
            
            if (editandoId) {
                const index = datosCache.modulos.findIndex(m => m.id == editandoId);
                datosCache.modulos[index] = nuevoModulo;
            } else {
                datosCache.modulos.push(nuevoModulo);
            }
        }
        
        cerrarModal();
        actualizarEstadisticas();
        if (seccionActual === editandoTipo) renderizarSeccion();
    }

    async function eliminarItem(tipo, id) {
        if (!confirm('¿Estás seguro de eliminar este elemento?')) return;
        
        if (tipo === 'alumnos') {
            datosCache.alumnos = datosCache.alumnos.filter(a => a.id != id);
        } else if (tipo === 'examenes') {
            datosCache.examenes = datosCache.examenes.filter(e => e.id != id);
        } else if (tipo === 'modulos') {
            datosCache.modulos = datosCache.modulos.filter(m => m.id != id);
        }
        
        actualizarEstadisticas();
        renderizarSeccion();
    }

    // ==================== RENDERIZADO ====================
    function renderAlumnos() {
        if (datosCache.alumnos.length === 0) {
            return '<p style="text-align: center; padding: 40px;">📭 No tienes estudiantes asignados</p>';
        }
        
        let html = `<button class="btn-add" onclick="abrirModal('alumnos')">+ Nuevo Alumno</button>
            <h3>📋 Mis Alumnos (${datosCache.alumnos.length})</h3>
            <table><thead><tr><th>ID</th><th>Nombre</th><th>Grado</th><th>Promedio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>`;
        
        datosCache.alumnos.forEach(a => {
            const promedio = a.promedio || 0;
            const estado = obtenerEstado(promedio);
            const clase = obtenerClase(promedio);
            html += `<tr>
                <td>${a.id}</td>
                <td><strong>${a.nombre}</strong></td>
                <td>${a.grado}°</td>
                <td>${promedio}/5.0</td>
                <td><span class="badge ${clase}">${estado}</span></td>
                <td>
                    <button class="btn-edit" onclick="abrirModal('alumnos', ${a.id})">✏️</button>
                    <button class="btn-delete" onclick="eliminarItem('alumnos', ${a.id})">🗑️</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        return html;
    }

    function renderExamenes() {
        if (datosCache.examenes.length === 0) {
            return '<p style="text-align: center; padding: 40px;">📭 No hay exámenes registrados</p>';
        }
        
        let html = `<button class="btn-add" onclick="abrirModal('examenes')">+ Nuevo Examen</button>
            <h3>📝 Exámenes (${datosCache.examenes.length})</h3>
            <table><thead><tr><th>ID</th><th>Nombre</th><th>Grado</th><th>Materia</th><th>Acciones</th></tr></thead><tbody>`;
        
        datosCache.examenes.forEach(e => {
            html += `<tr>
                <td>${e.id}</td>
                <td><strong>${e.nombre}</strong></td>
                <td>${e.grado}°</td>
                <td>${e.materia}</td>
                <td>
                    <button class="btn-edit" onclick="abrirModal('examenes', ${e.id})">✏️</button>
                    <button class="btn-delete" onclick="eliminarItem('examenes', ${e.id})">🗑️</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        return html;
    }

    function renderCalificaciones() {
        if (datosCache.calificaciones.length === 0) {
            return '<p style="text-align: center; padding: 40px;">📭 No hay calificaciones registradas</p>';
        }
        
        let html = `<h3>⭐ Calificaciones (${datosCache.calificaciones.length})</h3>
            <table><thead><tr><th>ID</th><th>Alumno</th><th>Examen</th><th>Nota</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>`;
        
        datosCache.calificaciones.forEach(c => {
            const nota = c.nota || 0;
            const estado = obtenerEstado(nota);
            const clase = obtenerClase(nota);
            html += `<tr>
                <td>${c.id}</td>
                <td><strong>${c.alumno_nombre}</strong></td>
                <td>${c.examen_nombre}</td>
                <td><strong>${nota}/5.0</strong></td>
                <td><span class="badge ${clase}">${estado}</span></td>
                <td>${c.fecha || '-'}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
        return html;
    }

    function renderModulos() {
        if (datosCache.modulos.length === 0) {
            return '<p style="text-align: center; padding: 40px;">📭 No hay módulos disponibles</p>';
        }
        
        let html = `<button class="btn-add" onclick="abrirModal('modulos')">+ Nuevo Módulo</button>
            <h3>📚 Módulos Académicos (${datosCache.modulos.length})</h3>
            <table><thead><tr><th>ID</th><th>Nombre</th><th>Profesor</th><th>Créditos</th><th>Horario</th><th>Acciones</th></tr></thead><tbody>`;
        
        datosCache.modulos.forEach(m => {
            html += `<tr>
                <td>${m.id}</td>
                <td><strong>${m.nombre}</strong></td>
                <td>${m.profesor}</td>
                <td>${m.creditos}</td>
                <td>${m.horario}</td>
                <td>
                    <button class="btn-edit" onclick="abrirModal('modulos', ${m.id})">✏️</button>
                    <button class="btn-delete" onclick="eliminarItem('modulos', ${m.id})">🗑️</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        return html;
    }

    function renderEstadisticas() {
        const totalAlumnos = datosCache.alumnos.length;
        const aprobados = datosCache.alumnos.filter(a => (a.promedio || 0) >= 4.0).length;
        const mejoramiento = datosCache.alumnos.filter(a => (a.promedio || 0) >= 3.5 && (a.promedio || 0) < 4.0).length;
        const reprobados = datosCache.alumnos.filter(a => (a.promedio || 0) < 3.5).length;
        const promedioGeneral = totalAlumnos > 0 
            ? (datosCache.alumnos.reduce((s, a) => s + (a.promedio || 0), 0) / totalAlumnos).toFixed(1)
            : 0;
        
        return `
            <h3>📊 Estadísticas Académicas</h3>
            <div class="stats-grid" style="margin-top: 20px;">
                <div class="stat-card"><h3>${totalAlumnos}</h3><p>Total Alumnos</p></div>
                <div class="stat-card" style="background: #059669;"><h3>${aprobados}</h3><p>Aprobados (≥4.0)</p></div>
                <div class="stat-card" style="background: #d97706;"><h3>${mejoramiento}</h3><p>Plan Mejoramiento (3.5-3.9)</p></div>
                <div class="stat-card" style="background: #dc2626;"><h3>${reprobados}</h3><p>Reprueban (<3.5)</p></div>
                <div class="stat-card"><h3>${promedioGeneral}</h3><p>Promedio General</p></div>
            </div>
        `;
    }

    function renderizarSeccion() {
        const contenido = document.getElementById('contenido');
        switch(seccionActual) {
            case 'alumnos': contenido.innerHTML = renderAlumnos(); break;
            case 'examenes': contenido.innerHTML = renderExamenes(); break;
            case 'calificaciones': contenido.innerHTML = renderCalificaciones(); break;
            case 'modulos': contenido.innerHTML = renderModulos(); break;
            case 'estadisticas': contenido.innerHTML = renderEstadisticas(); break;
            default: contenido.innerHTML = renderAlumnos();
        }
    }

    function cambiarSeccion(seccion) {
        seccionActual = seccion;
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        const tabs = document.querySelectorAll('.nav-tab');
        const indices = { alumnos: 0, examenes: 1, calificaciones: 2, modulos: 3, estadisticas: 4 };
        if (tabs[indices[seccion]]) tabs[indices[seccion]].classList.add('active');
        renderizarSeccion();
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // Inicialización
    const savedToken = localStorage.getItem('token');
    const savedDocente = localStorage.getItem('docente');
    if (savedToken && savedDocente) {
        TOKEN = savedToken;
        docenteActual = JSON.parse(savedDocente);
        document.getElementById('loginDiv').classList.add('hidden');
        document.getElementById('dashboardDiv').classList.remove('hidden');
        document.getElementById('docenteNombre').innerHTML = `👨‍🏫 ${docenteActual.nombre}`;
        cargarTodosLosDatos().then(() => {
            actualizarEstadisticas();
            cambiarSeccion('alumnos');
        });
    }
</script>
