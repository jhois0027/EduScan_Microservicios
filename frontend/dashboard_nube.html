<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nube | Sistema Académico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            position: fixed;
            width: 280px;
            transition: all 0.3s ease;
        }
        
        .logo {
            padding: 30px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-item {
            padding: 14px 24px;
            margin: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        
        .nav-item i {
            width: 24px;
            font-size: 18px;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        
        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        
        /* Cards */
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        /* Table Styles */
        .data-table {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }
        
        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            text-align: left;
            padding: 16px 12px;
            background: #f8fafc;
            color: #1e293b;
            font-weight: 600;
            font-size: 14px;
        }
        
        .data-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }
        
        .data-table tr:hover {
            background: #f8fafc;
        }
        
        /* Buttons */
        .btn-edit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            margin-right: 8px;
        }
        
        .btn-edit:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn-delete:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        
        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,0.3);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-aprobado {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-reprobado {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <h2><i class="fas fa-cloud"></i> Dashboard</h2>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Sistema Académico</p>
        </div>
        <nav style="margin-top: 30px;">
            <div class="nav-item active" data-section="students">
                <i class="fas fa-users"></i> <span>Estudiantes</span>
            </div>
            <div class="nav-item" data-section="modules">
                <i class="fas fa-book"></i> <span>Módulos</span>
            </div>
            <div class="nav-item" data-section="exams">
                <i class="fas fa-file-alt"></i> <span>Exámenes</span>
            </div>
            <div class="nav-item" data-section="grades">
                <i class="fas fa-chart-line"></i> <span>Calificaciones</span>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div style="margin-bottom: 30px;">
            <h1 style="color: white; font-size: 32px; font-weight: 700;" id="section-title">🎓 Gestión de Estudiantes</h1>
            <p style="color: rgba(255,255,255,0.8); margin-top: 8px;" id="section-subtitle">Administra todos los estudiantes del sistema</p>
        </div>

        <!-- Stats Cards -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;" id="stats-container"></div>

        <!-- Content Container -->
        <div class="fade-in" id="content-container"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 20px;" id="modal-title">Editar</h2>
            <form id="modal-form">
                <div id="modal-fields"></div>
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="submit" style="flex: 1; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Guardar</button>
                    <button type="button" onclick="closeModal()" style="flex: 1; background: #e2e8f0; color: #475569; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== DATOS ====================
        
        // Tus 15 estudiantes
        let students = [
            { id: 1, name: "Valentina Rojas", grade: "11º", email: "valentina.rojas@email.com", phone: "3001234567", status: "Activo" },
            { id: 2, name: "Mateo Herrera", grade: "10º", email: "mateo.herrera@email.com", phone: "3001234568", status: "Activo" },
            { id: 3, name: "Sofia Ramirez", grade: "11º", email: "sofia.ramirez@email.com", phone: "3001234569", status: "Activo" },
            { id: 4, name: "Lucas Mendoza", grade: "9º", email: "lucas.mendoza@email.com", phone: "3001234570", status: "Activo" },
            { id: 5, name: "Isabella Torres", grade: "11º", email: "isabella.torres@email.com", phone: "3001234571", status: "Activo" },
            { id: 6, name: "Samuel Gomez", grade: "8º", email: "samuel.gomez@email.com", phone: "3001234572", status: "Inactivo" },
            { id: 7, name: "Camila Ortiz", grade: "10º", email: "camila.ortiz@email.com", phone: "3001234573", status: "Activo" },
            { id: 8, name: "Diego Fernandez", grade: "7º", email: "diego.fernandez@email.com", phone: "3001234574", status: "Activo" },
            { id: 9, name: "Lucia Mendez", grade: "9º", email: "lucia.mendez@email.com", phone: "3001234575", status: "Activo" },
            { id: 10, name: "Javier Castro", grade: "6º", email: "javier.castro@email.com", phone: "3001234576", status: "Inactivo" },
            { id: 11, name: "Daniela Paz", grade: "5º", email: "daniela.paz@email.com", phone: "3001234577", status: "Activo" },
            { id: 12, name: "Andres Silva", grade: "4º", email: "andres.silva@email.com", phone: "3001234578", status: "Activo" },
            { id: 13, name: "Carolina Reyes", grade: "3º", email: "carolina.reyes@email.com", phone: "3001234579", status: "Activo" },
            { id: 14, name: "Felipe Munoz", grade: "2º", email: "felipe.munoz@email.com", phone: "3001234580", status: "Activo" },
            { id: 15, name: "Natalia Herrera", grade: "1º", email: "natalia.herrera@email.com", phone: "3001234581", status: "Activo" }
        ];
        
        let modules = [
            { id: 1, name: "Matemáticas", teacher: "Prof. González", credits: 4, schedule: "Lunes 8-10am" },
            { id: 2, name: "Español", teacher: "Prof. Martínez", credits: 4, schedule: "Martes 8-10am" },
            { id: 3, name: "Ciencias", teacher: "Prof. Rodríguez", credits: 3, schedule: "Miércoles 8-10am" },
            { id: 4, name: "Historia", teacher: "Prof. López", credits: 3, schedule: "Jueves 8-10am" },
            { id: 5, name: "Inglés", teacher: "Prof. Wilson", credits: 4, schedule: "Viernes 8-10am" }
        ];
        
        let exams = [
            { id: 1, name: "Examen Final Matemáticas", date: "2024-12-15", module: "Matemáticas", maxScore: 100, percentage: 30 },
            { id: 2, name: "Examen Final Español", date: "2024-12-16", module: "Español", maxScore: 100, percentage: 30 },
            { id: 3, name: "Examen Final Ciencias", date: "2024-12-17", module: "Ciencias", maxScore: 100, percentage: 30 },
            { id: 4, name: "Proyecto Historia", date: "2024-12-18", module: "Historia", maxScore: 100, percentage: 40 },
            { id: 5, name: "Examen Oral Inglés", date: "2024-12-19", module: "Inglés", maxScore: 100, percentage: 25 }
        ];
        
        let grades = [
            { id: 1, studentId: 1, studentName: "Valentina Rojas", examId: 1, examName: "Examen Final Matemáticas", score: 85, status: "Aprobado" },
            { id: 2, studentId: 1, studentName: "Valentina Rojas", examId: 2, examName: "Examen Final Español", score: 92, status: "Aprobado" },
            { id: 3, studentId: 2, studentName: "Mateo Herrera", examId: 1, examName: "Examen Final Matemáticas", score: 78, status: "Aprobado" },
            { id: 4, studentId: 3, studentName: "Sofia Ramirez", examId: 1, examName: "Examen Final Matemáticas", score: 95, status: "Aprobado" },
            { id: 5, studentId: 4, studentName: "Lucas Mendoza", examId: 1, examName: "Examen Final Matemáticas", score: 45, status: "Reprobado" },
            { id: 6, studentId: 5, studentName: "Isabella Torres", examId: 2, examName: "Examen Final Español", score: 88, status: "Aprobado" },
            { id: 7, studentId: 6, studentName: "Samuel Gomez", examId: 3, examName: "Examen Final Ciencias", score: 67, status: "Aprobado" },
            { id: 8, studentId: 7, studentName: "Camila Ortiz", examId: 4, examName: "Proyecto Historia", score: 90, status: "Aprobado" },
            { id: 9, studentId: 8, studentName: "Diego Fernandez", examId: 5, examName: "Examen Oral Inglés", score: 72, status: "Aprobado" },
            { id: 10, studentId: 9, studentName: "Lucia Mendez", examId: 1, examName: "Examen Final Matemáticas", score: 82, status: "Aprobado" }
        ];
        
        let currentSection = 'students';
        
        // ==================== FUNCIONES ====================
        
        function updateStats() {
            const totalStudents = students.length;
            const activeStudents = students.filter(s => s.status === 'Activo').length;
            const totalModules = modules.length;
            const totalExams = exams.length;
            const avgGrade = grades.reduce((sum, g) => sum + g.score, 0) / (grades.length || 1);
            
            document.getElementById('stats-container').innerHTML = `
                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <p style="color: #64748b; font-size: 14px;">Total Estudiantes</p>
                            <h3 style="font-size: 32px; font-weight: 700; color: #1e293b;">${totalStudents}</h3>
                            <p style="color: #10b981; font-size: 12px; margin-top: 5px;"><i class="fas fa-check-circle"></i> ${activeStudents} activos</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #667eea20, #764ba220);">
                            <i class="fas fa-users" style="color: #667eea;"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <p style="color: #64748b; font-size: 14px;">Módulos</p>
                            <h3 style="font-size: 32px; font-weight: 700; color: #1e293b;">${totalModules}</h3>
                            <p style="color: #64748b; font-size: 12px; margin-top: 5px;"><i class="fas fa-book"></i> Activos</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #10b98120, #05966920);">
                            <i class="fas fa-book" style="color: #10b981;"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <p style="color: #64748b; font-size: 14px;">Exámenes</p>
                            <h3 style="font-size: 32px; font-weight: 700; color: #1e293b;">${totalExams}</h3>
                            <p style="color: #64748b; font-size: 12px; margin-top: 5px;"><i class="fas fa-calendar"></i> Programados</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b20, #d9770620);">
                            <i class="fas fa-file-alt" style="color: #f59e0b;"></i>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <p style="color: #64748b; font-size: 14px;">Promedio General</p>
                            <h3 style="font-size: 32px; font-weight: 700; color: #1e293b;">${avgGrade.toFixed(1)}</h3>
                            <p style="color: #64748b; font-size: 12px; margin-top: 5px;"><i class="fas fa-chart-line"></i> Sobre 100</p>
                        </div>
                        <div class="stat-icon" style="background: linear-gradient(135deg, #ef444420, #dc262620);">
                            <i class="fas fa-star" style="color: #ef4444;"></i>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderStudents() {
            return `
                <div class="data-table">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="font-size: 20px; font-weight: 700;">📋 Lista de Estudiantes</h2>
                        <button class="btn-add" onclick="openCreateModal('students')">
                            <i class="fas fa-plus"></i> Nuevo Estudiante
                        </button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Grado</th>
                                    <th>Email</th>
                                    <th>Teléfono</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${students.map(student => `
                                    <tr>
                                        <td>${student.id}</td>
                                        <td><strong>${student.name}</strong></td>
                                        <td><span class="badge" style="background: #e0e7ff; color: #4338ca;">${student.grade}</span></td>
                                        <td>${student.email}</td>
                                        <td>${student.phone}</td>
                                        <td><span class="badge ${student.status === 'Activo' ? 'badge-aprobado' : 'badge-reprobado'}">${student.status}</span></td>
                                        <td>
                                            <button class="btn-edit" onclick="openEditModal('students', ${student.id})">
                                                <i class="fas fa-pencil-alt"></i> Editar
                                            </button>
                                            <button class="btn-delete" onclick="deleteItem('students', ${student.id})">

                                    </tr>
                                `).join('')}

                        </table>

            `;
        }
        
        function renderModules() {
            return `
                <div class="data-table">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="font-size: 20px; font-weight: 700;">📚 Módulos Académicos</h2>
                        <button class="btn-add" onclick="openCreateModal('modules')">
                            <i class="fas fa-plus"></i> Nuevo Módulo
                        </button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Nombre</th><th>Profesor</th><th>Créditos</th><th>Horario</th><th>Acciones</th></tr>
                            </thead>
                            <tbody>
                                ${modules.map(module => `
                                    <tr>
                                        <td>${module.id}</td>
                                        <td><strong>${module.name}</strong></td>
                                        <td>${module.teacher}</td>
                                        <td>${module.credits}</td>
                                        <td>${module.schedule}</td>
                                        <td>
                                            <button class="btn-edit" onclick="openEditModal('modules', ${module.id})"><i class="fas fa-pencil-alt"></i> Editar</button>
                                            <button class="btn-delete" onclick="deleteItem('modules', ${module.id})"><i class="fas fa-trash"></i> Eliminar</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function renderExams() {
            return `
                <div class="data-table">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="font-size: 20px; font-weight: 700;">📝 Exámenes Programados</h2>
                        <button class="btn-add" onclick="openCreateModal('exams')">
                            <i class="fas fa-plus"></i> Nuevo Examen
                        </button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Nombre</th><th>Fecha</th><th>Módulo</th><th>Puntaje Máx</th><th>% Nota</th><th>Acciones</th></tr>
                            </thead>
                            <tbody>
                                ${exams.map(exam => `
                                    <tr>
                                        <td>${exam.id}</td>
                                        <td><strong>${exam.name}</strong></td>
                                        <td>${exam.date}</td>
                                        <td>${exam.module}</td>
                                        <td>${exam.maxScore}</td>
                                        <td>${exam.percentage}%</td>
                                        <td>
                                            <button class="btn-edit" onclick="openEditModal('exams', ${exam.id})"><i class="fas fa-pencil-alt"></i> Editar</button>
                                            <button class="btn-delete" onclick="deleteItem('exams', ${exam.id})"><i class="fas fa-trash"></i> Eliminar</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function renderGrades() {
            // Agrupar por estudiante para mejor visualización
            return `
                <div class="data-table">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">

                        <button class="btn-add" onclick="openCreateModal('grades')">
                            <i class="fas fa-plus"></i> Nueva Calificación
                        </button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Estudiante</th>
                                    <th>Grado</th>
                                    <th>Examen</th>
                                    <th>Nota</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${grades.map(grade => {
                                    const student = students.find(s => s.id === grade.studentId);
                                    return `
                                        <tr>
                                            <td>${grade.id}</td>
                                            <td><strong>${grade.studentName}</strong></td>
                                            <td>${student ? student.grade : 'N/A'}</td>
                                            <td>${grade.examName}</td>
                                            <td><span style="font-size: 18px; font-weight: 700; ${grade.score >= 60 ? 'color: #10b981' : 'color: #ef4444'}">${grade.score}</span></td>
                                            <td><span class="badge ${grade.status === 'Aprobado' ? 'badge-aprobado' : 'badge-reprobado'}">${grade.status}</span></td>
                                            <td>
                                                <button class="btn-edit" onclick="openEditModal('grades', ${grade.id})"><i class="fas fa-pencil-alt"></i> Editar</button>
                                                <button class="btn-delete" onclick="deleteItem('grades', ${grade.id})"><i class="fas fa-trash"></i> Eliminar</button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function renderContent() {
            const container = document.getElementById('content-container');
            const title = document.getElementById('section-title');
            const subtitle = document.getElementById('section-subtitle');
            
            const titles = {
                students: { title: "🎓 Gestión de Estudiantes", subtitle: "Administra todos los estudiantes del sistema" },
                modules: { title: "📚 Gestión de Módulos", subtitle: "Organiza los módulos académicos" },
                exams: { title: "📝 Gestión de Exámenes", subtitle: "Programa y administra evaluaciones" },
                grades: { title: "⭐ Gestión de Calificaciones", subtitle: "Registra y consulta notas de estudiantes" }
            };
            
            title.textContent = titles[currentSection].title;
            subtitle.textContent = titles[currentSection].subtitle;
            
            switch(currentSection) {
                case 'students': container.innerHTML = renderStudents(); break;
                case 'modules': container.innerHTML = renderModules(); break;
                case 'exams': container.innerHTML = renderExams(); break;
                case 'grades': container.innerHTML = renderGrades(); break;
            }
        }
        
        // CRUD Functions
        function openEditModal(section, id) {
            let item;
            switch(section) {
                case 'students': item = students.find(s => s.id === id); break;
                case 'modules': item = modules.find(m => m.id === id); break;
                case 'exams': item = exams.find(e => e.id === id); break;
                case 'grades': item = grades.find(g => g.id === id); break;
            }
            
            document.getElementById('modal-title').textContent = `✏️ Editar ${section.slice(0, -1)}`;
            const fieldsContainer = document.getElementById('modal-fields');
            
            const excludeFields = ['id'];
            if(section === 'grades') excludeFields.push('studentName', 'examName');
            
            fieldsContainer.innerHTML = Object.keys(item)
                .filter(k => !excludeFields.includes(k))
                .map(key => `
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b;">${key.charAt(0).toUpperCase() + key.slice(1)}</label>
                        <input type="text" name="${key}" value="${item[key]}" required>
                    </div>
                `).join('');
            
            document.getElementById('modal').style.display = 'flex';
            
            document.getElementById('modal-form').onsubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const updatedItem = { id, ...Object.fromEntries(formData) };
                
                switch(section) {
                    case 'students':
                        const idx = students.findIndex(s => s.id === id);
                        students[idx] = updatedItem;
                        break;
                    case 'modules':
                        const idxM = modules.findIndex(m => m.id === id);
                        modules[idxM] = updatedItem;
                        break;
                    case 'exams':
                        const idxE = exams.findIndex(e => e.id === id);
                        exams[idxE] = updatedItem;
                        break;
                    case 'grades':
                        const idxG = grades.findIndex(g => g.id === id);
                        const oldGrade = grades[idxG];
                        grades[idxG] = { ...updatedItem, id, studentName: oldGrade.studentName, examName: oldGrade.examName, status: updatedItem.score >= 60 ? 'Aprobado' : 'Reprobado' };
                        break;
                }
                
                updateStats();
                renderContent();
                closeModal();
            };
        }
        
        function openCreateModal(section) {
            document.getElementById('modal-title').textContent = `➕ Crear Nuevo ${section.slice(0, -1)}`;
            const fieldsContainer = document.getElementById('modal-fields');
            
            let fields = [];
            switch(section) {
                case 'students': fields = ['name', 'grade', 'email', 'phone', 'status']; break;
                case 'modules': fields = ['name', 'teacher', 'credits', 'schedule']; break;
                case 'exams': fields = ['name', 'date', 'module', 'maxScore', 'percentage']; break;
                case 'grades': fields = ['studentId', 'examId', 'score']; break;
            }
            
            if(section === 'grades') {
                fieldsContainer.innerHTML = `
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Estudiante</label>
                        <select name="studentId" required>
                            <option value="">Seleccionar estudiante</option>
                            ${students.map(s => `<option value="${s.id}">${s.name} (${s.grade})</option>`).join('')}
                        </select>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Examen</label>
                        <select name="examId" required>
                            <option value="">Seleccionar examen</option>
                            ${exams.map(e => `<option value="${e.id}">${e.name} - ${e.module}</option>`).join('')}
                        </select>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Nota (0-100)</label>
                        <input type="number" name="score" min="0" max="100" required>
                    </div>
                `;
            } else {
                fieldsContainer.innerHTML = fields.map(field => `
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">${field.charAt(0).toUpperCase() + field.slice(1)}</label>
                        <input type="text" name="${field}" required>
                    </div>
                `).join('');
            }
            
            document.getElementById('modal').style.display = 'flex';
            
            document.getElementById('modal-form').onsubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                if(section === 'grades') {
                    const studentId = parseInt(formData.get('studentId'));
                    const examId = parseInt(formData.get('examId'));
                    const score = parseInt(formData.get('score'));
                    const student = students.find(s => s.id === studentId);
                    const exam = exams.find(e => e.id === examId);
                    
                    const newGrade = {
                        id: Date.now(),
                        studentId: studentId,
                        studentName: student.name,
                        examId: examId,
                        examName: exam.name,
                        score: score,
                        status: score >= 60 ? 'Aprobado' : 'Reprobado'
                    };
                    grades.push(newGrade);
                } else {
                    const newItem = { id: Date.now(), ...Object.fromEntries(formData) };
                    switch(section) {
                        case 'students': students.push(newItem); break;
                        case 'modules': modules.push(newItem); break;
                        case 'exams': exams.push(newItem); break;
                    }
                }
                
                updateStats();
                renderContent();
                closeModal();
            };
        }
        
        function deleteItem(section, id) {
            if(confirm('¿Estás seguro de eliminar este elemento? Esta acción no se puede deshacer.')) {
                switch(section) {
                    case 'students': students = students.filter(s => s.id !== id); break;
                    case 'modules': modules = modules.filter(m => m.id !== id); break;
                    case 'exams': exams = exams.filter(e => e.id !== id); break;
                    case 'grades': grades = grades.filter(g => g.id !== id); break;
                }
                updateStats();
                renderContent();
            }
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentSection = item.dataset.section;
                renderContent();
            });
        });
        
        // Initial load
        updateStats();
        renderContent();
    </script>
</body>
</html>
