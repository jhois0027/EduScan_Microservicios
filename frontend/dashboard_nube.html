<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nube | Sistema Académico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        /* Login Container */
        .login-container {
            max-width: 450px;
            margin: 100px auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease;
        }
        .login-container h2 {
    font-size: 28px;
    text-align: center;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    background-clip: text;           /* Standard property first */
    -webkit-background-clip: text;   /* Vendor prefix second */
    -webkit-text-fill-color: transparent;
}
        .login-container input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .login-container input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-container button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        /* Dashboard Styles */
        .dashboard { display: none; }
        .sidebar {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            position: fixed;
            width: 280px;
        }
       .logo { 
    padding: 30px 24px; 
    border-bottom: 1px solid rgba(255,255,255,0.1); 
}

.logo h2 { 
    font-size: 24px; 
    background: linear-gradient(135deg, #fff, #a78bfa); 
    background-clip: text;           /* Standard property */
    -webkit-background-clip: text;   /* Vendor prefix for Safari/old Chrome */
    -webkit-text-fill-color: transparent; 
}
        .nav-item {
            padding: 14px 24px;
            margin: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .main-content { margin-left: 280px; padding: 30px; }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }
        .stat-card:hover { transform: translateY(-5px); }
        .data-table {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            overflow-x: auto;
        }
        .data-table table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left;
            padding: 16px 12px;
            background: #f8fafc;
            color: #1e293b;
            font-weight: 600;
        }
        .data-table td { padding: 14px 12px; border-bottom: 1px solid #e2e8f0; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-aprobado { background: #d1fae5; color: #065f46; }
        .badge-reprobado { background: #fee2e2; color: #991b1b; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="loginSection" class="login-container">
        <h2><i class="fas fa-cloud"></i> EduScan</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Sistema Académico - Acceso Docente</p>
        <input type="email" id="email" placeholder="Correo electrónico" value="ana@eduscan.com">
        <input type="password" id="password" placeholder="Contraseña" value="123">
        <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
        <div id="loginError" class="error-message"></div>
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8;">
            <i class="fas fa-info-circle"></i> Demo: ana@eduscan.com / 123 (grados 10°-11°)<br>
            carlos@eduscan.com / 123 (grados 8°-9°)
        </p>
    </div>

    <!-- Dashboard (oculto hasta login) -->
    <div id="dashboardSection" class="dashboard">
        <div class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-cloud"></i> Dashboard</h2>
                <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">Sistema Académico</p>
            </div>
            <nav style="margin-top: 30px;">
                <div class="nav-item active" data-section="students">
                    <i class="fas fa-users"></i> <span>Mis Estudiantes</span>
                </div>
                <div class="nav-item" data-section="grades">
                    <i class="fas fa-chart-line"></i> <span>Calificaciones</span>
                </div>
            </nav>
        </div>

        <div class="main-content">
            <div class="user-info">
                <div><i class="fas fa-user-circle" style="font-size: 40px; color: #667eea;"></i></div>
                <div><strong id="docenteNombre"></strong><br><span id="docenteEmail" style="font-size: 12px; color: #64748b;"></span></div>
                <div style="flex:1;"></div>
                <div><span id="misGrados" style="background: #e0e7ff; padding: 5px 12px; border-radius: 20px; font-size: 12px;"></span></div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>

            <div style="margin-bottom: 30px;">
                <h1 style="color: white; font-size: 32px;" id="section-title">🎓 Mis Estudiantes</h1>
                <p style="color: rgba(255,255,255,0.8);" id="section-subtitle">Estudiantes asignados a tus grados</p>
            </div>

            <div class="stats-grid" id="stats-container"></div>
            <div class="fade-in" id="content-container"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const API_URL = 'https://eduscan-gateway.onrender.com';
        
        let token = null;
        let docenteActual = null;
        let misAlumnos = [];
        let misCalificaciones = [];
        let currentSection = 'students';

        // ==================== FUNCIONES DE AUTENTICACIÓN ====================
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            
            try {
                const response = await fetch(`${API_URL}/api/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    token = data.token;
                    docenteActual = data.docente;
                    localStorage.setItem('token', token);
                    localStorage.setItem('docente', JSON.stringify(docenteActual));
                    
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardSection').style.display = 'block';
                    document.getElementById('docenteNombre').innerHTML = `${docenteActual.nombre}`;
                    document.getElementById('docenteEmail').innerHTML = docenteActual.email;
                    
                    await cargarMisAlumnos();
                    await cargarMisCalificaciones();
                    updateStats();
                    renderContent();
                } else {
                    errorDiv.textContent = data.error || 'Credenciales inválidas';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión: ' + error.message;
            }
        }
        
        async function cargarMisAlumnos() {
            try {
                const response = await fetch(`${API_URL}/api/mis-alumnos`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data.success) {
                    misAlumnos = data.alumnos || [];
                    document.getElementById('misGrados').innerHTML = `📚 Grados: ${data.mis_grados?.join(', ') || 'Ninguno'}`;
                }
            } catch (error) {
                console.error('Error cargando alumnos:', error);
            }
        }
        
        async function cargarMisCalificaciones() {
            try {
                const response = await fetch(`${API_URL}/api/mis-calificaciones`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data.success) {
                    misCalificaciones = data.calificaciones || [];
                }
            } catch (error) {
                console.error('Error cargando calificaciones:', error);
            }
        }
        
        function updateStats() {
            const totalAlumnos = misAlumnos.length;
            const activos = misAlumnos.filter(a => (a.promedio || 0) >= 60).length;
            const totalExamenes = misCalificaciones.length;
            const promedio = misCalificaciones.length > 0 
                ? (misCalificaciones.reduce((sum, c) => sum + c.nota, 0) / misCalificaciones.length).toFixed(1)
                : 0;
            
            document.getElementById('stats-container').innerHTML = `
                <div class="stat-card">
                    <div><i class="fas fa-users" style="font-size: 28px; color: #667eea;"></i></div>
                    <h3 style="font-size: 32px; margin: 10px 0;">${totalAlumnos}</h3>
                    <p>📋 Mis Estudiantes</p>
                    <small>✅ ${activos} aprobados</small>
                </div>
                <div class="stat-card">
                    <div><i class="fas fa-file-alt" style="font-size: 28px; color: #10b981;"></i></div>
                    <h3 style="font-size: 32px; margin: 10px 0;">${totalExamenes}</h3>
                    <p>📝 Exámenes corregidos</p>
                </div>
                <div class="stat-card">
                    <div><i class="fas fa-chart-line" style="font-size: 28px; color: #f59e0b;"></i></div>
                    <h3 style="font-size: 32px; margin: 10px 0;">${promedio}</h3>
                    <p>⭐ Promedio general</p>
                </div>
            `;
        }
        
        function renderStudents() {
            if (misAlumnos.length === 0) {
                return `<div class="data-table"><p style="text-align: center; padding: 40px;">📭 No tienes estudiantes asignados</p></div>`;
            }
            
            return `
                <div class="data-table">
                    <h2 style="margin-bottom: 20px;">📋 Lista de Mis Estudiantes</h2>
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Nombre</th><th>Grado</th><th>Email</th><th>Promedio</th><th>Estado</th></tr>
                        </thead>
                        <tbody>
                            ${misAlumnos.map(alumno => `
                                <tr>
                                    <td>${alumno.id}</td>
                                    <td><strong>${alumno.nombre}</strong></td>
                                    <td><span class="badge" style="background:#e0e7ff">${alumno.grado}°</span></td>
                                    <td>${alumno.correo || '-'}</td>
                                    <td>${alumno.promedio || 0}</td>
                                    <td><span class="badge ${(alumno.promedio || 0) >= 60 ? 'badge-aprobado' : 'badge-reprobado'}">${(alumno.promedio || 0) >= 60 ? 'Aprobado' : 'En curso'}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function renderGrades() {
            if (misCalificaciones.length === 0) {
                return `<div class="data-table"><p style="text-align: center; padding: 40px;">📭 No hay calificaciones registradas</p></div>`;
            }
            
            return `
                <div class="data-table">
                    <h2 style="margin-bottom: 20px;">⭐ Calificaciones de mis estudiantes</h2>
                    <table>
                        <thead><tr><th>Estudiante</th><th>Grado</th><th>Examen</th><th>Nota</th><th>Fecha</th><th>Estado</th></tr></thead>
                        <tbody>
                            ${misCalificaciones.map(cal => `
                                <tr>
                                    <td><strong>${cal.alumno}</strong></td>
                                    <td>${cal.grado}°</td>
                                    <td>${cal.examen}</td>
                                    <td><span style="font-size:18px; font-weight:700; ${cal.nota >= 70 ? 'color:#10b981' : 'color:#ef4444'}">${cal.nota}</span></td>
                                    <td>${cal.fecha}</td>
                                    <td><span class="badge ${cal.nota >= 70 ? 'badge-aprobado' : 'badge-reprobado'}">${cal.nota >= 70 ? 'Aprobado' : 'Reprobado'}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function renderContent() {
            const container = document.getElementById('content-container');
            const title = document.getElementById('section-title');
            const subtitle = document.getElementById('section-subtitle');
            
            if (currentSection === 'students') {
                title.innerHTML = '🎓 Mis Estudiantes';
                subtitle.innerHTML = 'Estudiantes asignados a tus grados';
                container.innerHTML = renderStudents();
            } else {
                title.innerHTML = '⭐ Mis Calificaciones';
                subtitle.innerHTML = 'Calificaciones de tus estudiantes';
                container.innerHTML = renderGrades();
            }
        }
        
        // Navegación
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentSection = item.dataset.section;
                renderContent();
            });
        });
        
        function logout() {
            token = null;
            docenteActual = null;
            localStorage.removeItem('token');
            localStorage.removeItem('docente');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
        }
        
        // Verificar sesión guardada
        const savedToken = localStorage.getItem('token');
        const savedDocente = localStorage.getItem('docente');
        if (savedToken && savedDocente) {
            token = savedToken;
            docenteActual = JSON.parse(savedDocente);
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('docenteNombre').innerHTML = docenteActual.nombre;
            document.getElementById('docenteEmail').innerHTML = docenteActual.email;
            cargarMisAlumnos().then(() => {
                cargarMisCalificaciones().then(() => {
                    updateStats();
                    renderContent();
                });
            });
        }
        
        // Inicializar navegación
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentSection = item.dataset.section;
                renderContent();
            });
        });
    </script>
</body>
</html>
