<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduScan - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #4f46e5; margin-bottom: 8px; }
        p { color: #64748b; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-card h3 { color: #64748b; font-size: 0.85rem; margin-bottom: 8px; }
        .stat-card .value { font-size: 2.5rem; font-weight: 800; color: #4f46e5; }
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .table-header {
            padding: 16px 20px;
            background: #f8fafc;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        .badge {
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-excellent { background: #d1fae5; color: #065f46; }
        .badge-good { background: #dbeafe; color: #1e40af; }
        .badge-average { background: #fed7aa; color: #9a3412; }
        .badge-low { background: #fee2e2; color: #991b1b; }
        .btn {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
        }
        .btn:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>íģ EduScan Dashboard</h1>
            <p>GestiÃģn acadÃĐmica - Datos guardados localmente</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3>Total Alumnos</h3><div class="value" id="totalStudents">0</div></div>
            <div class="stat-card"><h3>Promedio General</h3><div class="value" id="avgGrade">0</div></div>
            <div class="stat-card"><h3>Aprobados</h3><div class="value" id="passedCount">0</div></div>
        </div>

        <div class="table-container">
            <div class="table-header">íŋ Cuadro de Honor</div>
            <table id="honorTable">
                <thead><tr><th>#</th><th>Nombre</th><th>Grado</th><th>CalificaciÃģn</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="table-container">
            <div class="table-header">íģ Lista de Alumnos</div>
            <table id="studentsTable">
                <thead><tr><th>ID</th><th>Nombre</th><th>Grado</th><th>CalificaciÃģn</th><th>Acciones</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <button class="btn" onclick="agregarAlumno()">+ Agregar Alumno</button>
    </div>

    <script>
        // DATOS DE EJEMPLO - 15 ALUMNOS
        let students = [
            { id: 1, name: "Valentina Rojas", grade: 11, score: 98 },
            { id: 2, name: "Mateo Herrera", grade: 10, score: 85 },
            { id: 3, name: "SofÃ­a RamÃ­rez", grade: 11, score: 96 },
            { id: 4, name: "Lucas Mendoza", grade: 9, score: 72 },
            { id: 5, name: "Isabella Torres", grade: 11, score: 100 },
            { id: 6, name: "Samuel GÃģmez", grade: 8, score: 78 },
            { id: 7, name: "Camila Ortiz", grade: 10, score: 92 },
            { id: 8, name: "Diego FernÃĄndez", grade: 7, score: 68 },
            { id: 9, name: "LucÃ­a MÃĐndez", grade: 9, score: 88 },
            { id: 10, name: "Javier Castro", grade: 6, score: 75 },
            { id: 11, name: "Daniela Paz", grade: 5, score: 82 },
            { id: 12, name: "AndrÃĐs Silva", grade: 4, score: 71 },
            { id: 13, name: "Carolina Reyes", grade: 3, score: 94 },
            { id: 14, name: "Felipe MuÃąoz", grade: 2, score: 67 },
            { id: 15, name: "Natalia Herrera", grade: 1, score: 89 }
        ];

        // Guardar en localStorage
        function saveToLocalStorage() {
            localStorage.setItem('eduscan_students_nube', JSON.stringify(students));
        }

        // Cargar desde localStorage
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('eduscan_students_nube');
            if (saved && JSON.parse(saved).length > 0) {
                students = JSON.parse(saved);
            } else {
                saveToLocalStorage();
            }
        }

        // Renderizar todo
        function render() {
            // EstadÃ­sticas
            document.getElementById('totalStudents').innerText = students.length;
            const avg = students.length ? Math.round(students.reduce((s,a) => s + a.score, 0) / students.length) : 0;
            document.getElementById('avgGrade').innerText = avg;
            const passed = students.filter(s => s.score >= 60).length;
            document.getElementById('passedCount').innerText = passed;

            // Cuadro de Honor (Top 5)
            const honorSorted = [...students].sort((a,b) => b.score - a.score).slice(0,5);
            const honorBody = document.querySelector('#honorTable tbody');
            honorBody.innerHTML = honorSorted.map((s,i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${s.name}</td>
                    <td>${s.grade}Â°</td>
                    <td>${s.score}%</td>
                </tr>
            `).join('');

            // Lista de alumnos
            const studentsBody = document.querySelector('#studentsTable tbody');
            studentsBody.innerHTML = students.map(s => {
                let badgeClass = s.score >= 90 ? 'badge-excellent' : s.score >= 75 ? 'badge-good' : s.score >= 60 ? 'badge-average' : 'badge-low';
                return `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.grade}Â°</td>
                        <td><span class="badge ${badgeClass}">${s.score}%</span></td>
                        <td>
                            <button onclick="editarAlumno(${s.id})" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">âïļ</button>
                            <button onclick="eliminarAlumno(${s.id})" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">í·ïļ</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // CRUD: Agregar
        function agregarAlumno() {
            const name = prompt('Nombre del alumno:');
            const grade = parseInt(prompt('Grado (1-11):'));
            const score = parseInt(prompt('CalificaciÃģn (0-100):'));
            if (name && grade && !isNaN(score) && grade >= 1 && grade <= 11 && score >= 0 && score <= 100) {
                const newId = Math.max(...students.map(s=>s.id), 0) + 1;
                students.push({ id: newId, name, grade, score });
                saveToLocalStorage();
                render();
            } else {
                alert('Datos invÃĄlidos. AsegÃšrate de que el grado sea 1-11 y la nota 0-100');
            }
        }

        // CRUD: Editar
        function editarAlumno(id) {
            const s = students.find(s => s.id === id);
            if(s) {
                const name = prompt('Nuevo nombre:', s.name);
                const grade = parseInt(prompt('Nuevo grado (1-11):', s.grade));
                const score = parseInt(prompt('Nueva calificaciÃģn (0-100):', s.score));
                if(name && grade && !isNaN(score) && grade >= 1 && grade <= 11 && score >= 0 && score <= 100) {
                    s.name = name;
                    s.grade = grade;
                    s.score = score;
                    saveToLocalStorage();
                    render();
                } else {
                    alert('Datos invÃĄlidos');
                }
            }
        }

        // CRUD: Eliminar
        function eliminarAlumno(id) {
            if(confirm('ÂŋEliminar este alumno?')) {
                students = students.filter(s => s.id !== id);
                saveToLocalStorage();
                render();
            }
        }

        // Inicializar
        loadFromLocalStorage();
        render();
    </script>
</body>
</html>
