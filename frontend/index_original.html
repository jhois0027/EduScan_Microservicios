<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduScan - Corrector de Exámenes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 30px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 70px; height: 70px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; }
        h1 { color: #667eea; font-size: 28px; }
        .select-alumno { margin-bottom: 20px; }
        .select-alumno label { display: block; font-weight: 600; margin-bottom: 8px; }
        .select-alumno select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 14px; }
        .modos { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-modo { flex: 1; padding: 12px; border: 2px solid #e0e0e0; background: white; border-radius: 15px; cursor: pointer; transition: all 0.3s; }
        .btn-modo.active { background: #667eea; border-color: #667eea; color: white; }
        .upload-area { border: 3px dashed #ccc; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; background: #f9f9f9; }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .video-container { position: relative; border-radius: 20px; overflow: hidden; background: #000; }
        video { width: 100%; border-radius: 20px; }
        .preview-img { width: 100%; border-radius: 15px; margin: 15px 0; }
        .btn { padding: 12px 20px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin: 5px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: #48bb78; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .resultados { margin-top: 25px; animation: fadeIn 0.5s; }
        .nota-circle { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); margin: 20px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .nota-circle span { font-size: 48px; font-weight: bold; }
        .stats { display: flex; gap: 15px; margin: 25px 0; }
        .stat { flex: 1; text-align: center; padding: 20px; border-radius: 15px; background: #f7f7f7; }
        .stat-value { font-size: 36px; font-weight: bold; display: block; }
        .correctas .stat-value { color: #48bb78; }
        .incorrectas .stat-value { color: #f56565; }
        .detalles { background: #f7f7f7; border-radius: 15px; padding: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .detalle-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #e0e0e0; }
        .detalle-item.aprobado { color: #48bb78; }
        .detalle-item.reprobado { color: #f56565; }
        .detalle-item.desempeno { color: #ed8936; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .container { padding: 15px; } .nota-circle { width: 120px; height: 120px; } .nota-circle span { font-size: 36px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📸</div>
            <h1>EduScan</h1>
            <p>Corrector de examenes por IA</p>
        </div>

        <div class="select-alumno">
            <label>Seleccionar Alumno:</label>
            <select id="alumnoSelect">
                <option value="">-- Seleccione un alumno --</option>
            </select>
        </div>

        <div class="modos">
            <button id="modoCamaraBtn" class="btn-modo active">📷 Tomar Foto</button>
            <button id="modoGaleriaBtn" class="btn-modo">🖼️ Subir Imagen</button>
        </div>

        <div id="cameraContainer" style="display: none;">
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="capturarBtn" class="btn btn-primary" style="flex:2">📸 Capturar</button>
                <button id="cancelarCamaraBtn" class="btn btn-secondary" style="flex:1">Cancelar</button>
            </div>
        </div>

        <div id="uploadContainer">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <p>Haz clic para seleccionar una foto del examen</p>
                <input type="file" id="fileInput" accept="image/*" style="display: none">
            </div>
        </div>

        <div id="previewContainer" style="display: none;">
            <h3>Vista previa:</h3>
            <img id="preview" class="preview-img">
            <div style="display: flex; gap: 10px;">
                <button id="corregirBtn" class="btn btn-success" style="flex:2">✨ Corregir Examen</button>
                <button id="cancelarBtn" class="btn btn-secondary" style="flex:1">Cancelar</button>
            </div>
        </div>

        <div id="resultados" style="display: none;">
            <h2 style="text-align:center">Resultados</h2>
            <div class="nota-circle"><span id="notaValor">0.0</span><small>/ 5.0</small></div>
            <div class="stats">
                <div class="stat correctas"><span class="stat-value" id="correctas">0</span><span>Correctas</span></div>
                <div class="stat incorrectas"><span class="stat-value" id="incorrectas">0</span><span>Incorrectas</span></div>
            </div>
            <div class="detalles"><h3>Detalle por pregunta:</h3><div id="detalleLista"></div></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="guardarBtn" class="btn btn-primary" style="flex:1">💾 Guardar</button>
                <button id="nuevoBtn" class="btn btn-secondary" style="flex:1">📝 Nuevo</button>
                <a href="dashboard.html" class="btn btn-secondary" style="flex:1; text-align:center; text-decoration:none;">📊 Dashboard</a>
            </div>
        </div>

        <div id="loading" style="display: none;"><div class="spinner"></div><p style="text-align:center">Procesando con IA...</p></div>
    </div>

    <script>
        const API_URL = 'https://eduscan-gateway.onrender.com';
        const DB_API_URL = 'https://eduscan-database.onrender.com';
        
        let imagenActual = null;
        let stream = null;
        let respuestasCorreccion = null;
        
        // Elementos
        const alumnoSelect = document.getElementById('alumnoSelect');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const modoCamaraBtn = document.getElementById('modoCamaraBtn');
        const modoGaleriaBtn = document.getElementById('modoGaleriaBtn');
        const cameraContainer = document.getElementById('cameraContainer');
        const uploadContainer = document.getElementById('uploadContainer');
        const previewContainer = document.getElementById('previewContainer');
        const preview = document.getElementById('preview');
        const corregirBtn = document.getElementById('corregirBtn');
        const resultados = document.getElementById('resultados');
        const loading = document.getElementById('loading');
        const nuevoBtn = document.getElementById('nuevoBtn');
        const cancelarBtn = document.getElementById('cancelarBtn');
        const guardarBtn = document.getElementById('guardarBtn');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const capturarBtn = document.getElementById('capturarBtn');
        const cancelarCamaraBtn = document.getElementById('cancelarCamaraBtn');
        
        function obtenerEstado(puntaje) {
            if (puntaje <= 3.0) return { texto: 'Reprobado', clase: 'reprobado' };
            if (puntaje <= 3.9) return { texto: 'Desempeno Bajo', clase: 'desempeno' };
            return { texto: 'Aprueba', clase: 'aprobado' };
        }
        
        async function cargarAlumnos() {
            try {
                const response = await fetch(`${DB_API_URL}/alumnos`);
                const data = await response.json();
                if (alumnoSelect && data.alumnos) {
                    alumnoSelect.innerHTML = '<option value="">-- Seleccione un alumno --</option>' +
                        data.alumnos.map(a => `<option value="${a.id_alumno}">${a.nombre}</option>`).join('');
                }
            } catch (error) { console.error('Error cargando alumnos:', error); }
        }
        
        async function abrirCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                cameraContainer.style.display = 'block';
                uploadContainer.style.display = 'none';
                previewContainer.style.display = 'none';
            } catch (error) { alert('No se pudo acceder a la camara'); }
        }
        
        function cerrarCamara() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
            video.srcObject = null;
            cameraContainer.style.display = 'none';
            uploadContainer.style.display = 'block';
        }
        
        function capturarFoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                imagenActual = new File([blob], 'examen.jpg', { type: 'image/jpeg' });
                preview.src = URL.createObjectURL(blob);
                previewContainer.style.display = 'block';
                cerrarCamara();
                uploadContainer.style.display = 'none';
            }, 'image/jpeg', 0.9);
        }
        
        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                imagenActual = file;
                preview.src = URL.createObjectURL(file);
                previewContainer.style.display = 'block';
                uploadContainer.style.display = 'none';
            }
        };
        
        modoCamaraBtn.onclick = () => {
            modoCamaraBtn.classList.add('active');
            modoGaleriaBtn.classList.remove('active');
            abrirCamara();
        };
        
        modoGaleriaBtn.onclick = () => {
            modoGaleriaBtn.classList.add('active');
            modoCamaraBtn.classList.remove('active');
            uploadContainer.style.display = 'block';
            cameraContainer.style.display = 'none';
        };
        
        cancelarCamaraBtn.onclick = cerrarCamara;
        capturarBtn.onclick = capturarFoto;
        
        cancelarBtn.onclick = () => {
            imagenActual = null;
            previewContainer.style.display = 'none';
            uploadContainer.style.display = 'block';
            resultados.style.display = 'none';
        };
        
        corregirBtn.onclick = async () => {
            if (!imagenActual) { alert('Selecciona una imagen primero'); return; }
            loading.style.display = 'block';
            previewContainer.style.display = 'none';
            const formData = new FormData();
            formData.append('file', imagenActual);
            try {
                const response = await fetch(`${API_URL}/corregir`, { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) {
                    respuestasCorreccion = data;
                    document.getElementById('notaValor').textContent = data.nota_final.toFixed(1);
                    document.getElementById('correctas').textContent = data.correctas;
                    document.getElementById('incorrectas').textContent = data.incorrectas;
                    const detalleHtml = data.respuestas_alumno.map((puntaje, idx) => {
                        const estado = obtenerEstado(puntaje);
                        return `<div class="detalle-item ${estado.clase}"><span>Pregunta ${idx+1}</span><span>${puntaje.toFixed(1)} / 5.0</span><span>${estado.texto}</span></div>`;
                    }).join('');
                    document.getElementById('detalleLista').innerHTML = detalleHtml;
                    resultados.style.display = 'block';
                } else { alert('Error: ' + JSON.stringify(data)); }
            } catch (error) { alert('Error al conectar con el servidor'); }
            finally { loading.style.display = 'none'; }
        };
        
        guardarBtn.onclick = async () => {
            const alumnoId = alumnoSelect.value;
            if (!alumnoId) { alert('Selecciona un alumno'); return; }
            if (!respuestasCorreccion) { alert('Primero corrige un examen'); return; }
            const evaluacion = {
                id_alumno: parseInt(alumnoId),
                puntaje: respuestasCorreccion.nota_final,
                fecha: new Date().toISOString().split('T')[0],
                respuestas: respuestasCorreccion.respuestas_alumno.map((p, i) => ({ id_pregunta: i+1, es_correcta: p >= 4.0 }))
            };
            try {
                const response = await fetch(`${DB_API_URL}/nueva_evaluacion`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(evaluacion)
                });
                if (response.ok) { alert('Guardado correctamente'); nuevoBtn.click(); }
                else { alert('Error al guardar'); }
            } catch (error) { alert('Error de conexion'); }
        };
        
        nuevoBtn.onclick = () => {
            imagenActual = null;
            previewContainer.style.display = 'none';
            resultados.style.display = 'none';
            uploadContainer.style.display = 'block';
            modoCamaraBtn.classList.add('active');
            modoGaleriaBtn.classList.remove('active');
            if (stream) cerrarCamara();
        };
        
        cargarAlumnos();
    </script>
</body>
</html>
