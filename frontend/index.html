<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduScan - Corrector de Examenes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-css">ES</div>
            <h1>EduScan</h1>
            <p>Corrector de examenes por IA</p>
            <p class="small">Calificacion: 0.0 a 5.0</p>
        </div>

        <div class="select-alumno">
            <label>Seleccionar Alumno:</label>
            <select id="alumnoSelect">
                <option value="">-- Seleccione un alumno --</option>
            </select>
        </div>

        <div class="modos">
            <button id="modoCamaraBtn" class="btn-modo active">Tomar Foto</button>
            <button id="modoGaleriaBtn" class="btn-modo">Subir Imagen</button>
        </div>

        <div id="cameraContainer" style="display: none;">
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>
            <div class="camera-buttons">
                <button id="capturarBtn" class="btn-capturar">Capturar Examen</button>
                <button id="cancelarCamaraBtn" class="btn-secundario">Cancelar</button>
            </div>
        </div>

        <div id="uploadContainer">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">íł¸</div>
                <p>Toca para seleccionar una foto del examen</p>
                <input type="file" id="fileInput" accept="image/*" style="display: none">
            </div>
        </div>

        <div id="previewContainer" style="display: none;">
            <h3>Vista previa del examen:</h3>
            <img id="preview" class="preview-img">
            <div class="preview-buttons">
                <button id="corregirBtn" class="btn-corregir">Corregir Examen</button>
                <button id="cancelarBtn" class="btn-secundario">Cancelar</button>
            </div>
        </div>

        <div id="resultados" style="display: none;" class="resultados">
            <h2>Resultados del Examen</h2>
            <div class="nota-circle">
                <span id="notaValor">0.0</span>
                <small>/ 5.0</small>
            </div>
            
            <div class="stats">
                <div class="stat correctas">
                    <span class="stat-value" id="correctas">0</span>
                    <span class="stat-label">Correctas</span>
                </div>
                <div class="stat incorrectas">
                    <span class="stat-value" id="incorrectas">0</span>
                    <span class="stat-label">Incorrectas</span>
                </div>
            </div>

            <div class="detalles">
                <h3>Detalle por pregunta:</h3>
                <div id="detalleLista"></div>
            </div>

            <div class="resultados-buttons">
                <button id="guardarBtn" class="btn-guardar">Guardar Calificacion</button>
                <button id="nuevoBtn" class="btn-secundario">Corregir otro examen</button>
                <a href="dashboard.html" class="btn-dashboard">Ver Dashboard</a>
            </div>
        </div>

        <div id="loading" style="display: none;" class="loading">
            <div class="spinner"></div>
            <p>Procesando con IA...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
