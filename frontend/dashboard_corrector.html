<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduScan - Corrector IA (Simulado)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { color: #4f46e5; }
        .header p { color: #64748b; }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        select, button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
        }
        
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled { opacity: 0.5; }
        
        .camera-preview {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 16px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video, .preview-img { width: 100%; max-height: 300px; object-fit: contain; }
        .camera-placeholder {
            background: linear-gradient(135deg, #1e1b4b, #3730a3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: white;
            text-align: center;
            width: 100%;
        }
        
        .flex-row { display: flex; gap: 12px; }
        .flex-row button { flex: 1; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-success { background: #10b981; }
        
        .resultado {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            display: none;
        }
        .resultado.success { background: #d1fae5; color: #065f46; display: block; }
        .resultado.error { background: #fee2e2; color: #991b1b; display: block; }
        .resultado.loading { background: #e0e7ff; color: #3730a3; display: block; }
        
        .nota-final { font-size: 3rem; font-weight: 800; text-align: center; margin: 15px 0; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Corrector IA</h1>
            <p>Toma foto o sube imagen - Correccion automatica</p>
        </div>

        <div class="card">
            <select id="selectAlumno">
                <option value="">-- Seleccionar alumno --</option>
            </select>
            <select id="selectExamen">
                <option value="">-- Seleccionar examen --</option>
            </select>
        </div>

        <div class="card">
            <div class="camera-preview" id="cameraPreview">
                <div class="camera-placeholder" id="cameraPlaceholder">
                    <i class="fas fa-camera" style="font-size: 48px; margin-bottom: 16px;"></i>
                    <p>Haz clic en "Abrir Camara" o "Subir Imagen"</p>
                </div>
                <video id="cameraVideo" autoplay playsinline style="display:none;"></video>
                <canvas id="cameraCanvas" style="display:none;"></canvas>
                <img id="previewImg" class="preview-img" style="display:none;">
            </div>

            <div class="flex-row">
                <button id="btnAbrirCamara"><i class="fas fa-camera"></i> Camara</button>
                <button id="btnSubirImagen" class="btn-secondary"><i class="fas fa-upload"></i> Subir</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">

            <button id="btnCorregir" disabled><i class="fas fa-magic"></i> Corregir</button>
            <button id="btnGuardar" class="btn-success" style="display:none;"><i class="fas fa-save"></i> Guardar</button>
        </div>

        <div id="resultadoArea" class="resultado"></div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let alumnos = [];
        let examenes = [];
        let currentImageData = null;
        let cameraStream = null;
        let ultimaCorreccion = null;
        
        function mostrarToast(msg, esError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = esError ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function cargarDatos() {
            const savedAlumnos = localStorage.getItem('eduscan_alumnos');
            const savedExamenes = localStorage.getItem('eduscan_examenes');
            
            if (savedAlumnos) alumnos = JSON.parse(savedAlumnos);
            else alumnos = [
                { id: 1, nombre: "Valentina Rojas", grado: 11, promedio: 98 },
                { id: 2, nombre: "Mateo Herrera", grado: 10, promedio: 85 },
                { id: 3, nombre: "Sofia Ramirez", grado: 11, promedio: 96 },
                { id: 4, nombre: "Isabella Torres", grado: 11, promedio: 100 },
                { id: 5, nombre: "Samuel Gomez", grado: 8, promedio: 78 }
            ];
            
            if (savedExamenes) examenes = JSON.parse(savedExamenes);
            else examenes = [
                { id: 1, titulo: "Examen Matematicas", modulo: "Matematicas", grado: 11 },
                { id: 2, titulo: "Examen Historia", modulo: "Historia", grado: 9 },
                { id: 3, titulo: "Evaluacion Ingles", modulo: "Ingles", grado: 10 }
            ];
            
            document.getElementById('selectAlumno').innerHTML = '<option value="">-- Seleccionar alumno --</option>' + 
                alumnos.map(a => <option value="${a.id}">${a.nombre} (${a.grado}°)</option>).join('');
            
            document.getElementById('selectExamen').innerHTML = '<option value="">-- Seleccionar examen --</option>' + 
                examenes.map(e => <option value="${e.id}">${e.titulo} (${e.grado}°)</option>).join('');
        }
        
        async function abrirCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                video.style.display = 'block';
                cameraStream = stream;
                document.getElementById('cameraPlaceholder').style.display = 'none';
                setTimeout(() => tomarFoto(), 1500);
            } catch(err) {
                mostrarToast('Error: ' + err.message, true);
            }
        }
        
        function tomarFoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentImageData = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('previewImg').src = currentImageData;
            document.getElementById('previewImg').style.display = 'block';
            video.style.display = 'none';
            document.getElementById('btnCorregir').disabled = false;
            if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
            document.getElementById('btnAbrirCamara').style.display = 'inline-block';
        }
        
        function subirImagen() {
            document.getElementById('fileInput').click();
        }
        
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentImageData = ev.target.result;
                document.getElementById('previewImg').src = currentImageData;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('btnCorregir').disabled = false;
            };
            reader.readAsDataURL(file);
        }
        
        function corregirExamen() {
            const alumnoId = document.getElementById('selectAlumno').value;
            const examenId = document.getElementById('selectExamen').value;
            
            if (!alumnoId || !examenId) {
                mostrarToast('Selecciona un alumno y examen', true);
                return;
            }
            if (!currentImageData) {
                mostrarToast('Toma una foto o sube imagen', true);
                return;
            }
            
            const resultDiv = document.getElementById('resultadoArea');
            resultDiv.className = 'resultado loading';
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analizando imagen...';
            
            setTimeout(() => {
                const notaSimulada = Math.floor(Math.random() * 41) + 60;
                const alumno = alumnos.find(a => a.id == alumnoId);
                const examen = examenes.find(e => e.id == examenId);
                
                ultimaCorreccion = { nota: notaSimulada, examenId: examenId, alumnoId: alumnoId };
                
                let colorBg = notaSimulada >= 70 ? '#d1fae5' : notaSimulada >= 50 ? '#fed7aa' : '#fee2e2';
                resultDiv.className = 'resultado success';
                resultDiv.innerHTML = `
                    <div style="text-align:center;">
                        <div class="nota-final">${notaSimulada}%</div>
                        <p><strong>${alumno?.nombre || 'Alumno'}</strong> - ${examen?.titulo || 'Examen'}</p>
                        <p>El examen ha sido corregido automaticamente.</p>
                        <button id="btnGuardarResultado" class="btn-success" style="margin-top:15px;">Guardar Calificacion</button>
                    </div>
                `;
                document.getElementById('btnGuardarResultado').onclick = guardarCalificacion;
                document.getElementById('btnGuardar').style.display = 'inline-block';
            }, 1500);
        }
        
        async function guardarCalificacion() {
    if (!ultimaCorreccion) {
        mostrarToast('No hay correccion para guardar', true);
        return;
    }

    try {
        // Intentar guardar en la API
        const response = await fetch(`${API_URL}/calificaciones`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id_alumno: parseInt(ultimaCorreccion.alumnoId),
                id_examen: parseInt(ultimaCorreccion.examenId),
                nota: ultimaCorreccion.nota
            })
        });

        if (response.ok) {
            mostrarToast(`✅ Calificación guardada: ${ultimaCorreccion.nota}%`);
        } else {
            throw new Error('Error en API');
        }
    } catch (error) {
        console.error("Error guardando en API, usando localStorage:", error);
        
        // Fallback a localStorage (corregido)
        let calificaciones = JSON.parse(localStorage.getItem('eduscan_calificaciones') || '[]');
        calificaciones.push({
            id_alumno: parseInt(ultimaCorreccion.alumnoId),
            id_examen: parseInt(ultimaCorreccion.examenId),
            nota: ultimaCorreccion.nota,
            fecha: new Date().toISOString().split('T')[0]
        });
        localStorage.setItem('eduscan_calificaciones', JSON.stringify(calificaciones));
        
        // Actualizar promedio del alumno (CORREGIDO)
        let alumnosData = JSON.parse(localStorage.getItem('eduscan_alumnos') || '[]');
        const notasAlumno = calificaciones.filter(c => c.id_alumno === parseInt(ultimaCorreccion.alumnoId));
        const nuevoPromedio = notasAlumno.length > 0 
            ? Math.round(notasAlumno.reduce((s, c) => s + c.nota, 0) / notasAlumno.length)
            : ultimaCorreccion.nota;
        
        const idx = alumnosData.findIndex(a => a.id === parseInt(ultimaCorreccion.alumnoId));
        if (idx !== -1) {
            alumnosData[idx].promedio = nuevoPromedio;
            localStorage.setItem('eduscan_alumnos', JSON.stringify(alumnosData));
        }
        
        mostrarToast(`✅ Calificación guardada LOCALMENTE: ${ultimaCorreccion.nota}%`);
    }
    
    // Limpiar después de guardar
    document.getElementById('btnGuardar').style.display = 'none';
    document.getElementById('btnCorregir').disabled = true;
    currentImageData = null;
    
    // Recargar alumnos para actualizar el promedio
    await cargarAlumnos();
}

        document.getElementById('btnAbrirCamara').onclick = abrirCamara;
        document.getElementById('btnSubirImagen').onclick = subirImagen;
        document.getElementById('fileInput').onchange = handleImageUpload;
        document.getElementById('btnCorregir').onclick = corregirExamen;

        cargarDatos();
    </script>
