<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EduScan - Corrector IA | Plataforma Educativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 28px 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 36px;
            padding: 28px 24px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header h1 {
            background: linear-gradient(135deg, #1e1b4b, #4f46e5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            color: #4b5563;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f2f8;
        }

        label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        label i {
            color: #4f46e5;
            width: 22px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border-radius: 20px;
            border: 1.5px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(105deg, #4f46e5, #6d28d9);
            color: white;
            box-shadow: 0 5px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }

        .btn-success {
            background: linear-gradient(115deg, #059669, #10b981);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .camera-preview {
            background: #0f172a;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 20px;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video, .preview-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
        }

        .camera-placeholder {
            background: linear-gradient(125deg, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            color: #cbd5e1;
            text-align: center;
            width: 100%;
            border-radius: 32px;
            gap: 12px;
        }

        .camera-placeholder i {
            font-size: 48px;
            color: #818cf8;
        }

        .flex-row {
            display: flex;
            gap: 14px;
            margin-top: 6px;
        }

        .flex-row button {
            flex: 1;
        }

        .resultado {
            margin-top: 16px;
            padding: 24px;
            border-radius: 28px;
            display: none;
            animation: fadeSlideUp 0.3s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .resultado.success {
            background: linear-gradient(115deg, #ecfdf5, #d1fae5);
            color: #065f46;
            display: block;
            border-left: 6px solid #10b981;
        }

        .resultado.error {
            background: #fef2f2;
            color: #991b1b;
            display: block;
            border-left: 6px solid #ef4444;
        }

        .resultado.loading {
            background: #eef2ff;
            color: #3730a3;
            display: block;
            border-left: 6px solid #818cf8;
        }

        .nota-final {
            font-size: 3.5rem;
            font-weight: 800;
            text-align: center;
            margin: 12px 0;
            background: linear-gradient(135deg, #065f46, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1100;
            display: none;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
        }

        /* Login Container */
        .login-container {
            max-width: 450px;
            margin: 50px auto;
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-info-bar {
            background: white;
            border-radius: 80px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logout-btn {
            background: #ef4444;
            width: auto;
            padding: 8px 20px;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }
            .card {
                padding: 20px;
            }
            .flex-row {
                flex-direction: column;
                gap: 10px;
            }
            .nota-final {
                font-size: 2.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="loginSection" class="login-container">
        <h2><i class="fas fa-graduation-cap"></i> EduScan</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 30px;">Acceso Docente - Corrector IA</p>
        <input type="email" id="email" placeholder="Correo electrónico" value="ana@eduscan.com">
        <input type="password" id="password" placeholder="Contraseña" value="123">
        <button onclick="login()" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
        <div id="loginError" class="error-message" style="color: red; text-align: center; margin-top: 15px;"></div>
        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8;">
            <i class="fas fa-info-circle"></i> ana@eduscan.com / 123 (grados 10°-11°)<br>
            carlos@eduscan.com / 123 (grados 8°-9°)
        </p>
    </div>

    <!-- Contenido del Corrector (oculto hasta login) -->
    <div id="correctorSection" style="display: none;">
        <div class="container">
            <div class="header">
                <h1><i class="fas fa-graduation-cap"></i> EduScan · Corrector IA</h1>
                <p><i class="fas fa-brain"></i> Inteligencia artificial para evaluación automática</p>
            </div>

            <!-- Barra de usuario -->
            <div class="user-info-bar">
                <div><i class="fas fa-user-circle" style="font-size: 24px; color: #667eea;"></i> <strong id="docenteNombre"></strong></div>
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>

            <div class="card">
                <label><i class="fas fa-user-astronaut"></i> Estudiante</label>
                <select id="selectAlumno">
                    <option value="">-- Seleccionar estudiante --</option>
                </select>
                
                <label><i class="fas fa-book-open"></i> Examen</label>
                <input type="text" id="examenNombre" placeholder="Ej: Álgebra - Unidad 2">
                <input type="number" id="examenGrado" placeholder="Grado (1 a 11)">
            </div>

            <div class="card">
                <div class="camera-preview" id="cameraPreview">
                    <div class="camera-placeholder" id="cameraPlaceholder">
                        <i class="fas fa-camera-retro"></i>
                        <p>Captura el examen o sube una imagen</p>
                        <span style="font-size:12px; opacity:0.7;">Listo para corregir con IA</span>
                    </div>
                    <video id="cameraVideo" autoplay playsinline style="display:none; width:100%;"></video>
                    <canvas id="cameraCanvas" style="display:none;"></canvas>
                    <img id="previewImg" class="preview-img" style="display:none;">
                </div>

                <div class="flex-row">
                    <button id="btnAbrirCamara" class="btn-primary"><i class="fas fa-camera"></i> Abrir Cámara</button>
                    <button id="btnCerrarCamara" class="btn-secondary" style="display:none;"><i class="fas fa-stop-circle"></i> Cerrar</button>
                    <button id="btnSubirImagen" class="btn-secondary"><i class="fas fa-cloud-upload-alt"></i> Subir Imagen</button>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">

                <button id="btnCorregir" class="btn-success" disabled><i class="fas fa-robot"></i> Corregir con IA</button>
            </div>

            <div id="resultadoArea" class="resultado"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================
        // CONFIGURACIÓN - CONEXIÓN A RENDER
        // ============================================
        const API_URL = 'https://eduscan-gateway.onrender.com';
        
        let token = null;
        let docenteActual = null;
        let alumnos = [];
        let currentImageData = null;
        let cameraStream = null;
        let ultimaCorreccion = null;

        // ============================================
        // FUNCIONES DE AUTENTICACIÓN
        // ============================================
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            
            try {
                const response = await fetch(`${API_URL}/api/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { 
                    method: 'POST' 
                });
                const data = await response.json();
                
                if (data.success) {
                    token = data.token;
                    docenteActual = data.docente;
                    localStorage.setItem('token', token);
                    localStorage.setItem('docente', JSON.stringify(docenteActual));
                    
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('correctorSection').style.display = 'block';
                    document.getElementById('docenteNombre').innerHTML = `${docenteActual.nombre}`;
                    
                    await cargarMisAlumnos();
                } else {
                    errorDiv.textContent = data.error || 'Credenciales inválidas';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión: ' + error.message;
            }
        }

        function logout() {
            token = null;
            docenteActual = null;
            localStorage.removeItem('token');
            localStorage.removeItem('docente');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('correctorSection').style.display = 'none';
            document.getElementById('email').value = 'ana@eduscan.com';
            document.getElementById('password').value = '';
            document.getElementById('selectAlumno').innerHTML = '<option value="">-- Seleccionar estudiante --</option>';
            document.getElementById('resultadoArea').className = 'resultado';
            document.getElementById('resultadoArea').innerHTML = '';
        }

        // ============================================
        // CARGAR SOLO LOS ALUMNOS DEL DOCENTE
        // ============================================
        async function cargarMisAlumnos() {
            if (!token) return;
            
            try {
                const response = await fetch(`${API_URL}/api/mis-alumnos`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    alumnos = data.alumnos || [];
                    actualizarSelectores();
                    mostrarToast(`✅ ${alumnos.length} estudiantes asignados`, false);
                    
                    if (data.mis_grados) {
                        console.log(`Grados asignados: ${data.mis_grados.join(', ')}`);
                    }
                } else {
                    mostrarToast('Error cargando alumnos', true);
                }
            } catch (error) {
                console.error('Error cargando alumnos:', error);
                mostrarToast('Error de conexión', true);
                alumnos = [];
                actualizarSelectores();
            }
        }
        
        function actualizarSelectores() {
            const selectAlumno = document.getElementById('selectAlumno');
            if (!selectAlumno) return;
            selectAlumno.innerHTML = '<option value="">🎓 -- Seleccionar estudiante --</option>';
            alumnos.forEach(a => {
                selectAlumno.innerHTML += `<option value="${a.id}">${a.nombre} (${a.grado}° grado) - Prom: ${a.promedio || 0}</option>`;
            });
        }
        
        function mostrarToast(mensaje, esError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.style.backgroundColor = esError ? '#dc2626' : '#0f172a';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3200);
        }
        
        // ============================================
        // CÁMARA
        // ============================================
        async function abrirCamara() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("Navegador sin soporte de cámara");
                }
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                await video.play();
                cameraStream = stream;
                
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('previewImg').style.display = 'none';
                video.style.display = 'block';
                document.getElementById('btnAbrirCamara').style.display = 'none';
                document.getElementById('btnCerrarCamara').style.display = 'inline-block';
                
                setTimeout(() => {
                    if (video.videoWidth > 0) {
                        tomarFoto();
                    }
                }, 2000);
            } catch (err) {
                mostrarToast("Error cámara: " + err.message, true);
            }
        }
        
        function tomarFoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            currentImageData = canvas.toDataURL('image/jpeg', 0.85);
            
            const previewImg = document.getElementById('previewImg');
            previewImg.src = currentImageData;
            previewImg.style.display = 'block';
            video.style.display = 'none';
            
            document.getElementById('btnCorregir').disabled = false;
            cerrarCamara();
        }
        
        function cerrarCamara() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            document.getElementById('cameraVideo').style.display = 'none';
            document.getElementById('btnAbrirCamara').style.display = 'inline-block';
            document.getElementById('btnCerrarCamara').style.display = 'none';
        }
        
        function subirImagen() {
            document.getElementById('fileInput').click();
        }
        
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentImageData = ev.target.result;
                const previewImg = document.getElementById('previewImg');
                previewImg.src = currentImageData;
                previewImg.style.display = 'block';
                document.getElementById('cameraPlaceholder').style.display = 'none';
                document.getElementById('cameraVideo').style.display = 'none';
                document.getElementById('btnCorregir').disabled = false;
            };
            reader.readAsDataURL(file);
        }
        
        // ============================================
        // CORRECCIÓN CON IA REAL
        // ============================================
        async function corregirExamen() {
            const alumnoId = document.getElementById('selectAlumno').value;
            const examenNombre = document.getElementById('examenNombre').value.trim();
            const examenGrado = document.getElementById('examenGrado').value;
            
            if (!alumnoId) {
                mostrarToast('❌ Selecciona un estudiante', true);
                return;
            }
            if (!examenNombre || !examenGrado) {
                mostrarToast('❌ Completa el nombre y grado del examen', true);
                return;
            }
            if (!currentImageData) {
                mostrarToast('📸 Captura o sube la imagen del examen', true);
                return;
            }
            
            const resultDiv = document.getElementById('resultadoArea');
            resultDiv.className = 'resultado loading';
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Procesando con IA... Analizando respuestas';
            
            try {
                const blob = await (await fetch(currentImageData)).blob();
                const formData = new FormData();
                formData.append('imagen', blob, 'examen.jpg');
                
                const response = await fetch(`${API_URL}/api/corregir-examen`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                const alumno = alumnos.find(a => a.id == alumnoId);
                
                if (data.success) {
                    ultimaCorreccion = {
                        id_alumno: parseInt(alumnoId),
                        alumno_nombre: alumno ? alumno.nombre : "Estudiante",
                        examen_nombre: examenNombre,
                        examen_grado: parseInt(examenGrado),
                        nota: data.nota,
                        feedback: data.feedback || "Corrección completada",
                        confianza: data.confianza || 0.85
                    };
                    
                    resultDiv.className = 'resultado success';
                    resultDiv.innerHTML = `
                        <div style="text-align:center;">
                            <div class="nota-final">${ultimaCorreccion.nota}%</div>
                            <p style="font-size: 1.2rem; font-weight: 600;">${alumno ? alumno.nombre : 'Estudiante'} · ${examenNombre}</p>
                            <p><i class="fas fa-chalkboard-teacher"></i> ${ultimaCorreccion.feedback}</p>
                            <p>Puntaje: <strong>${ultimaCorreccion.nota}/100</strong> | Grado: ${examenGrado}</p>
                            <p style="font-size: 12px; opacity: 0.7;">🤖 Confianza IA: ${Math.round(ultimaCorreccion.confianza * 100)}%</p>
                            <button id="btnGuardarNota" class="btn-success" style="margin-top: 16px; width: auto;"><i class="fas fa-save"></i> Guardar calificación</button>
                        </div>
                    `;
                    const guardarBtn = document.getElementById('btnGuardarNota');
                    if (guardarBtn) guardarBtn.onclick = guardarCalificacion;
                } else {
                    resultDiv.className = 'resultado error';
                    resultDiv.innerHTML = `<strong><i class="fas fa-exclamation-triangle"></i> Error:</strong> ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'resultado error';
                resultDiv.innerHTML = `<strong><i class="fas fa-exclamation-triangle"></i> Error IA:</strong> ${error.message}`;
            }
        }
        
        // ============================================
        // GUARDAR CALIFICACIÓN
        // ============================================
        async function guardarCalificacion() {
            if (!ultimaCorreccion) {
                mostrarToast('No hay corrección activa', true);
                return;
            }
            
            const hoy = new Date().toISOString().split('T')[0];
            
            const evaluacion = {
                id_alumno: ultimaCorreccion.id_alumno,
                puntaje: ultimaCorreccion.nota,
                fecha: hoy,
                examen_nombre: ultimaCorreccion.examen_nombre,
                feedback: ultimaCorreccion.feedback,
                confianza_validacion: ultimaCorreccion.confianza
            };
            
            try {
                const response = await fetch(`${API_URL}/nueva_evaluacion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(evaluacion)
                });
                
                if (response.ok) {
                    mostrarToast(`✅ Calificación ${ultimaCorreccion.nota}% guardada`, false);
                    
                    document.getElementById('btnCorregir').disabled = true;
                    currentImageData = null;
                    document.getElementById('previewImg').style.display = 'none';
                    document.getElementById('cameraPlaceholder').style.display = 'flex';
                    document.getElementById('examenNombre').value = '';
                    document.getElementById('examenGrado').value = '';
                    document.getElementById('resultadoArea').className = 'resultado';
                    document.getElementById('resultadoArea').innerHTML = '';
                    
                    await cargarMisAlumnos();
                } else {
                    const errorData = await response.json();
                    mostrarToast(`Error: ${errorData.error || 'Desconocido'}`, true);
                }
            } catch (error) {
                mostrarToast(`Error: ${error.message}`, true);
            }
        }
        
        // ============================================
        // EVENTOS
        // ============================================
        document.getElementById('btnAbrirCamara').onclick = abrirCamara;
        document.getElementById('btnCerrarCamara').onclick = cerrarCamara;
        document.getElementById('btnSubirImagen').onclick = subirImagen;
        document.getElementById('fileInput').onchange = handleImageUpload;
        document.getElementById('btnCorregir').onclick = corregirExamen;
        
        // Verificar sesión guardada
        const savedToken = localStorage.getItem('token');
        const savedDocente = localStorage.getItem('docente');
        if (savedToken && savedDocente) {
            token = savedToken;
            docenteActual = JSON.parse(savedDocente);
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('correctorSection').style.display = 'block';
            document.getElementById('docenteNombre').innerHTML = docenteActual.nombre;
            cargarMisAlumnos();
        }
    </script>
</body>
</html>
