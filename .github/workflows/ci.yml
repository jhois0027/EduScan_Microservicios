name: CI - Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # ✅ Actualizado
      
    - name: Setup Python
      uses: actions/setup-python@v5  # ✅ Actualizado
      with:
        python-version: '3.11'
    
    - name: Verify project structure
      run: |
        echo "📁 Verificando estructura del proyecto..."
        ls -la
        echo ""
        echo "📄 Verificando archivos importantes..."
        
        # Verificar que existe el dashboard (opcional)
        if [ -f "frontend/dashboard_nube.html" ]; then
          echo "✅ Dashboard encontrado: frontend/dashboard_nube.html"
        else
          echo "⚠️ Dashboard no encontrado, pero continuamos..."
        fi
        
        # Verificar README
        if [ -f "README.md" ]; then
          echo "✅ README.md encontrado"
          head -n 3 README.md
        else
          echo "⚠️ README.md no encontrado"
        fi
    
    - name: Check Python syntax
      run: |
        echo "🔍 Verificando sintaxis de Python..."
        python -m py_compile app.py 2>/dev/null || echo "⚠️ app.py tiene errores o no existe"
        
    - name: All checks passed
      run: |
        echo "🎉 Todos los checks pasaron correctamente!"
        echo "✅ Pipeline ejecutado exitosamente"