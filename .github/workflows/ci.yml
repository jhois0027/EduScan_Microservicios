name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # ✅ CAMBIADO: antes era @v3
    
    - name: Setup Python
      uses: actions/setup-python@v5  # ✅ CAMBIADO: antes era @v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=. --cov-report=xml || echo "No tests found"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v5  # ✅ CAMBIADO: antes era @v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false