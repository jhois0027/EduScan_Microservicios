name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4          # ✅ Cambiado de v3 a v4
    
    - name: Setup Python
      uses: actions/setup-python@v5      # ✅ Actualizado a v5 (opcional pero recomendado)
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=. --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v5    # ✅ Cambiado de v3 a v5
      with:
        file: ./coverage.xml
        fail_ci_if_error: false